<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet | Flujo TV Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .bg-netflix { background: #E50914; }
        .bg-disney { background: #006E99; }
        .bg-max { background: #0047FF; }
        .bg-prime { background: #00A8E1; }
        .bg-spotify { background: #1DB954; }
        .bg-youtube { background: #FF0000; }
        .bg-flujotv { background: #6366F1; } /* Color para Flujo TV */
        .bg-iptv { background: #F59E0B; }
        .bg-canva { background: #7D2AE8; }
        .bg-paramount { background: #0064FF; }
        .bg-egreso { background: #ef4444; }
    </style>
</head>
<body class="text-slate-100 p-4 md:p-6">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Ingreso Ventas (Hoy)</p>
                <p id="ventasBrutas" class="text-xl font-extrabold mt-1 text-white">$0.00</p>
            </div>
            
            <div class="glass p-4 rounded-3xl border-l-4 border-red-500 bg-red-500/5">
                <div class="flex justify-between items-center">
                    <p class="text-[9px] text-red-400 font-bold uppercase tracking-widest">Costo Total (Hoy)</p>
                    <button onclick="registrarEgresoRapido()" class="bg-red-500 text-[10px] px-2 py-0.5 rounded-lg hover:bg-red-400 transition-all">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <p id="egresosHoy" class="text-xl font-extrabold mt-1 text-white">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-emerald-500 bg-emerald-500/5">
                <p class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest">Utilidad Neta (Hoy)</p>
                <p id="cajaNeto" class="text-xl font-extrabold mt-1 text-emerald-400">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-purple-500">
                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">Utilidad Mes</p>
                <p id="gananciaMes" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-yellow-500">
                <p class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest">Balance Anual</p>
                <p id="gananciaAnio" class="text-xl font-extrabold mt-1 text-yellow-500 font-black">$0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3">
                <div class="glass p-6 rounded-3xl shadow-2xl">
                    <h2 class="text-xs font-black text-blue-400 uppercase tracking-widest mb-4 italic">Planet Register</h2>
                    <div class="space-y-3">
                        <input id="nombre" type="text" placeholder="CLIENTE" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none">
                        <input id="telefono" type="text" placeholder="TELÉFONO" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none">
                            <option value="NETFLIX">Netflix</option>
                            <option value="DISNEY+">Disney+</option>
                            <option value="MAX">Max</option>
                            <option value="PRIME VIDEO">Prime Video</option>
                            <option value="IPTV">IPTV</option>
                            <option value="FLUJO TV">Flujo TV</option> <option value="YOUTUBE">YouTube</option>
                            <option value="SPOTIFY">Spotify</option>
                            <option value="PARAMOUNT+">Paramount+</option>
                            <option value="CANVA PRO">Canva Pro</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="costo" type="number" step="0.01" placeholder="Costo $" class="bg-slate-900 border border-red-900/30 rounded-xl p-3 text-xs outline-none text-red-400">
                            <input id="precio" type="number" step="0.01" placeholder="Venta $" class="bg-slate-900 border border-emerald-900/30 rounded-xl p-3 text-xs font-bold text-emerald-400 outline-none">
                        </div>
                        <input id="vencimiento" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold text-white">
                        <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl shadow-lg uppercase text-[10px] tracking-widest transition-all">Registrar Venta</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="glass rounded-3xl overflow-hidden">
                    <div class="p-4 bg-white/5">
                        <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar hoy (Cliente o Servicio)..." class="w-full max-w-sm bg-slate-950 border border-slate-800 rounded-2xl px-4 py-2 text-xs outline-none focus:border-blue-500">
                    </div>
                    <div class="overflow-x-auto max-h-[600px]">
                        <table class="w-full text-left">
                            <thead class="bg-slate-950/50 text-slate-500 uppercase text-[9px] font-black tracking-widest sticky top-0">
                                <tr>
                                    <th class="p-5">Servicio / Cliente</th>
                                    <th class="p-5">Costo Unit.</th>
                                    <th class="p-5">Precio Venta</th>
                                    <th class="p-5">Estado</th>
                                    <th class="p-5 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        const PLATAFORMAS = {
            "NETFLIX": { icon: "fab fa-netflix", color: "bg-netflix" },
            "DISNEY+": { icon: "fas fa-wand-sparkles", color: "bg-disney" },
            "MAX": { icon: "fas fa-bolt", color: "bg-max" },
            "PRIME VIDEO": { icon: "fab fa-amazon", color: "bg-prime" },
            "SPOTIFY": { icon: "fab fa-spotify", color: "bg-spotify" },
            "YOUTUBE": { icon: "fab fa-youtube", color: "bg-youtube" },
            "FLUJO TV": { icon: "fas fa-play", color: "bg-flujotv" }, // Cambio aquí
            "IPTV": { icon: "fas fa-satellite-dish", color: "bg-iptv" },
            "CANVA PRO": { icon: "fas fa-palette", color: "bg-canva" },
            "PARAMOUNT+": { icon: "fas fa-mountain", color: "bg-paramount" },
            "EGRESO": { icon: "fas fa-minus-circle", color: "bg-egreso" }
        };

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                clientesGlobal = await res.json();
                renderizarTabla();
            } catch(e) { console.error("Error cargando datos", e); }
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            let sumaVentaHoy = 0, sumaCostoHoy = 0, utilMes = 0, utilAnio = 0;

            let filtrados = clientesGlobal.filter(c => c[1].toString().toLowerCase().includes(busqueda) || c[3].toString().toLowerCase().includes(busqueda));

            let html = "";
            filtrados.forEach(c => {
                const fReg = new Date(parseInt(c[0]));
                const esEgreso = (c[1].toString().toUpperCase() === "EGRESO");
                const costoVal = parseFloat(c[4]) || 0;
                const ventaVal = parseFloat(c[5]) || 0;

                if(!isNaN(fReg.getTime())) {
                    const esHoy = (fReg.toDateString() === hoy.toDateString());
                    const esMes = (fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026);

                    if(esEgreso) {
                        if(esHoy) sumaCostoHoy += ventaVal;
                        if(esMes) utilMes -= ventaVal;
                        utilAnio -= ventaVal;
                    } else {
                        if(esHoy) {
                            sumaVentaHoy += ventaVal;
                            sumaCostoHoy += costoVal;
                        }
                        if(esMes) utilMes += (ventaVal - costoVal);
                        utilAnio += (ventaVal - costoVal);
                    }
                }

                const plat = PLATAFORMAS[c[3].toUpperCase()] || { icon: "fas fa-tv", color: "bg-slate-700" };
                
                if(esEgreso) {
                    html += `
                        <tr class="bg-red-500/5 text-[11px]">
                            <td class="p-5 font-black text-red-400"><i class="fas fa-minus-circle mr-2"></i> GASTO: ${c[3]}</td>
                            <td class="p-5">--</td>
                            <td class="p-5 text-red-400">-$${ventaVal.toFixed(2)}</td>
                            <td class="p-5 uppercase text-[9px] font-bold">EGRESO CAJA</td>
                            <td class="p-5 text-right"><button onclick="eliminar('${c[0]}')" class="text-slate-700 hover:text-red-500 transition-colors"><i class="fas fa-trash"></i></button></td>
                        </tr>`;
                } else {
                    html += `
                        <tr class="hover:bg-white/5 text-[11px]">
                            <td class="p-5">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-lg ${plat.color} flex items-center justify-center text-white shadow-lg"><i class="${plat.icon} text-xs"></i></div>
                                    <div><p class="font-bold text-blue-400 uppercase tracking-tight">${c[1]}</p><p class="text-[9px] text-slate-500 font-bold">${c[3]}</p></div>
                                </div>
                            </td>
                            <td class="p-5 text-red-400/70 font-mono italic">$${costoVal.toFixed(2)}</td>
                            <td class="p-5 text-emerald-400 font-black">$${ventaVal.toFixed(2)}</td>
                            <td class="p-5"><span class="text-[8px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full font-bold">SINCRO OK</span></td>
                            <td class="p-5 text-right"><button onclick="eliminar('${c[0]}')" class="text-slate-800 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button></td>
                        </tr>`;
                }
            });

            tabla.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center text-slate-600 uppercase font-black">No hay registros hoy</td></tr>';
            
            // ASIGNACIÓN AL DASHBOARD
            document.getElementById('ventasBrutas').innerText = `$${sumaVentaHoy.toFixed(2)}`;
            document.getElementById('egresosHoy').innerText = `$${sumaCostoHoy.toFixed(2)}`;
            document.getElementById('cajaNeto').innerText = `$${(sumaVentaHoy - sumaCostoHoy).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${utilMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${utilAnio.toFixed(2)}`;
        }

        async function registrarEgresoRapido() {
            const m = prompt("Monto del gasto ($):");
            const mo = prompt("Motivo (Concepto):");
            if(!m || isNaN(m) || !mo) return;
            const data = { id: Date.now(), nombre: "EGRESO", telefono: "0", servicio: mo.toUpperCase(), costo: 0, precio: parseFloat(m), vencimiento: new Date().toISOString().split('T')[0] };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function guardarEnGoogle() {
            const btn = document.getElementById('btnGuardar');
            const data = { 
                id: Date.now(), 
                nombre: document.getElementById('nombre').value.toUpperCase().trim(), 
                telefono: document.getElementById('telefono').value.trim(), 
                servicio: document.getElementById('servicio').value, 
                costo: parseFloat(document.getElementById('costo').value) || 0, 
                precio: parseFloat(document.getElementById('precio').value) || 0, 
                vencimiento: document.getElementById('vencimiento').value 
            };
            if(!data.nombre || !data.vencimiento) return alert("Nombre y Fecha son obligatorios");
            btn.innerText = "REGISTRANDO..."; btn.disabled = true;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function eliminar(id) { 
            if(confirm("¿Estás seguro de eliminar este registro?")) { 
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) }); 
                location.reload(); 
            } 
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
