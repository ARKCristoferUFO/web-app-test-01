<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming - Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .btn-plataforma.active { background: #2563eb !important; color: white !important; border-color: #60a5fa; box-shadow: 0 0 15px rgba(37, 99, 235, 0.3); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .status-green { color: #10b981; border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .status-yellow { color: #fbbf24; border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .status-red { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="pb-10">

    <div class="sticky top-0 z-50 p-4 glass mb-6">
        <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-5 gap-4 text-center">
            <div><p class="text-[10px] text-slate-500 font-bold uppercase">Ventas Hoy</p><h2 id="gananciaDia" class="text-xl font-black">$0.00</h2></div>
            <div><p class="text-[10px] text-slate-500 font-bold uppercase">Costo Hoy</p><h2 id="costoDia" class="text-xl font-black text-red-500">$0.00</h2></div>
            <div class="border-x border-slate-800"><p class="text-[10px] text-blue-400 font-bold uppercase">Utilidad</p><h2 id="netoDia" class="text-xl font-black text-blue-400">$0.00</h2></div>
            <div><p class="text-[10px] text-slate-500 font-bold uppercase">Mes</p><h2 id="gananciaMes" class="text-xl font-black text-emerald-500">$0.00</h2></div>
            <div><p class="text-[10px] text-slate-500 font-bold uppercase">Año</p><h2 id="gananciaAnio" class="text-xl font-black text-slate-300">$0.00</h2></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <h3 class="text-blue-500 font-black text-sm uppercase mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span> Nuevo Registro
                </h3>
                <div class="space-y-4">
                    <input type="text" id="nombreCliente" placeholder="NOMBRE DEL CLIENTE" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800 outline-none text-white text-xs font-bold uppercase">
                    <input type="text" id="telefonoCliente" placeholder="WHATSAPP (Ej: 58412...)" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800 outline-none text-white text-xs">
                    
                    <div id="gridPlataformas" class="grid grid-cols-3 gap-2 max-h-40 overflow-y-auto pr-2"></div>
                    <div id="contenedorDatosDinamicos" class="space-y-3"></div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center">
                            <p class="text-[9px] text-slate-500 font-bold uppercase">Costo $</p>
                            <input type="number" id="costoServicio" step="0.01" class="bg-transparent w-full text-center outline-none font-bold" value="0.00">
                        </div>
                        <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center">
                            <p class="text-[9px] text-blue-500 font-bold uppercase">Venta $</p>
                            <input type="number" id="precioVenta" step="0.01" class="bg-transparent w-full text-center outline-none font-bold text-blue-400" value="0.00">
                        </div>
                    </div>
                    
                    <input type="date" id="fechaVencimiento" class="w-full bg-slate-950 p-4 rounded-xl border border-slate-800 text-white text-xs font-bold">
                    <button onclick="guardarRegistro()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all uppercase text-xs tracking-widest">Guardar Registro</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-slate-900/50 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-slate-800">
                    <input type="text" id="buscador" oninput="renderizarTabla()" placeholder="Buscar cliente o servicio..." class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 outline-none text-xs text-white">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-950 text-slate-500 uppercase text-[9px] font-black">
                            <tr>
                                <th class="p-4">Cliente / Servicio</th>
                                <th class="p-4 text-center">Estado</th>
                                <th class="p-4 text-center">Vence</th>
                                <th class="p-4 text-center">Gestión</th>
                                <th class="p-4"></th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="text-[11px] divide-y divide-slate-800/30"></tbody>
                    </table>
                </div>
                <div id="loader" class="p-10 text-center text-slate-600 animate-pulse font-bold uppercase text-[10px]">Conectando con Base_Streaming...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];
        const listaPlat = ["NETFLIX PERFIL", "NETFLIX PERSONAL", "DISNEY+", "MAX", "PRIME VIDEO", "PARAMOUNT+", "IPTV", "FLUJO TV", "TELELATINO", "VIX", "YOUTUBE", "SPOTIFY", "CRUNCHYROLL", "VIKI RAKUTEN", "CANVA PRO"];

        // FUNCIÓN CLAVE: Procesa la fecha y evita el error de zona horaria
        function limpiarYProcesarFecha(valor) {
            if (!valor) return new Date();
            let s = valor.toString().split("T")[0].trim();
            let p = s.split("-");
            if (p.length === 3) {
                return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
            }
            return new Date(valor);
        }

        function initGrid() {
            const grid = document.getElementById('gridPlataformas');
            listaPlat.forEach(p => {
                const btn = document.createElement('button');
                btn.innerText = p;
                btn.className = "btn-plataforma p-2 rounded-lg text-[8px] font-bold bg-slate-800 text-slate-400 border border-slate-700 transition-all";
                btn.onclick = () => { btn.classList.toggle('active'); actInputs(); };
                grid.appendChild(btn);
            });
        }

        function actInputs() {
            const cont = document.getElementById('contenedorDatosDinamicos');
            const act = document.querySelectorAll('.btn-plataforma.active');
            cont.innerHTML = '';
            act.forEach(b => {
                const div = document.createElement('div');
                div.className = "bg-slate-950 p-4 rounded-xl border border-blue-900/30 bloque-servicio";
                div.dataset.name = b.innerText;
                div.innerHTML = `<p class="text-blue-500 font-black text-[9px] mb-2 uppercase">${b.innerText}</p>
                    <input type="text" placeholder="Correo" class="val-u w-full bg-transparent border-b border-slate-800 mb-2 outline-none text-[11px]">
                    <input type="text" placeholder="Clave" class="val-p w-full bg-transparent border-b border-slate-800 mb-2 outline-none text-[11px]">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Perfil" class="val-perf bg-slate-900 p-1 rounded text-[10px]">
                        <input type="text" placeholder="PIN" class="val-pin bg-slate-900 p-1 rounded text-[10px]">
                    </div>`;
                cont.appendChild(div);
            });
        }

        async function guardarRegistro() {
            const btn = document.getElementById('btnGuardar');
            const nom = document.getElementById('nombreCliente').value.trim();
            const tel = document.getElementById('telefonoCliente').value.trim();
            const bloques = document.querySelectorAll('.bloque-servicio');
            if (!nom || !tel || bloques.length === 0) { alert("⚠️ Completa los datos."); return; }
            
            btn.innerText = "GUARDANDO..."; btn.disabled = true;
            let s=[], u=[], k=[], p=[], n=[];
            bloques.forEach(b => {
                s.push(b.dataset.name);
                u.push(b.querySelector('.val-u').value || '---');
                k.push(b.querySelector('.val-p').value || '---');
                p.push(b.querySelector('.val-perf').value || '---');
                n.push(b.querySelector('.val-pin').value || '---');
            });

            const data = {
                id: Date.now(), nombre: nom.toUpperCase(), telefono: tel,
                servicio: s.join(" + "), costo: document.getElementById('costoServicio').value,
                precio: document.getElementById('precioVenta').value, correo: u.join(" , "),
                clave: k.join(" , "), perfil: p.join(" , "), pin: n.join(" , "),
                vencimiento: document.getElementById('fechaVencimiento').value
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("✅ Registrado con éxito"); location.reload();
            } catch (e) { btn.innerText = "ERROR"; btn.disabled = false; }
        }

        async function cargar() {
            try {
                const r = await fetch(API_URL);
                clientesGlobal = await r.json();
                document.getElementById('loader').style.display = 'none';
                renderizarTabla();
            } catch (e) { document.getElementById('loader').innerText = "Error de conexión."; }
        }

        function renderizarTabla() {
            const tbody = document.getElementById('cuerpoTabla');
            const busq = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vD=0, cD=0, uM=0, uA=0;
            let html = "";

            clientesGlobal.filter(c => c[1].toLowerCase().includes(busq) || c[3].toLowerCase().includes(busq)).forEach(c => {
                const fVenc = limpiarYProcesarFecha(c[10]);
                fVenc.setHours(0,0,0,0);
                const diff = Math.ceil((fVenc.getTime() - hoy.getTime()) / 86400000);
                
                const fReg = new Date(parseInt(c[0]));
                const costo = parseFloat(c[4]) || 0;
                const precio = parseFloat(c[5]) || 0;

                if (!isNaN(fReg.getTime())) {
                    if (fReg.toDateString() === hoy.toDateString()) { vD += precio; cD += costo; }
                    if (fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === hoy.getFullYear()) uM += (precio - costo);
                    if (fReg.getFullYear() === hoy.getFullYear()) uA += (precio - costo);
                }

                let color = diff <= 0 ? "status-red" : (diff <= 3 ? "status-yellow" : "status-green");
                let txt = diff <= 0 ? "VENCIDO" : diff + " DÍAS";
                
                // Limpiamos la fecha para mostrarla sin el T04:00
                const fechaMostrar = c[10].toString().split("T")[0];

                html += `<tr class="hover:bg-slate-800/20">
                    <td class="p-4"><b>${c[1]}</b><br><span class="text-slate-500 text-[9px] font-bold uppercase">${c[3]}</span></td>
                    <td class="p-4 text-center"><span class="px-3 py-1 rounded-full border font-black text-[9px] ${color}">${txt}</span></td>
                    <td class="p-4 text-center font-mono text-slate-500">${fechaMostrar}</td>
                    <td class="p-4 text-center">
                        <div class="flex flex-wrap gap-1 justify-center">
                            <button onclick="enviarWA('${c[0]}','datos')" class="bg-blue-600 px-2 py-1 rounded-lg font-black text-[9px] uppercase hover:bg-blue-400">Accesos</button>
                            <button onclick="renovar('${c[0]}')" class="bg-emerald-600 px-2 py-1 rounded-lg font-black text-[9px] uppercase hover:bg-emerald-400">Renovar</button>
                            <button onclick="enviarWA('${c[0]}',3)" class="bg-yellow-500 text-black px-2 py-1 rounded-lg font-black text-[9px] uppercase hover:bg-yellow-300">3D</button>
                            <button onclick="enviarWA('${c[0]}',0)" class="bg-red-600 px-2 py-1 rounded-lg font-black text-[9px] uppercase hover:bg-red-400">0D</button>
                        </div>
                    </td>
                    <td class="p-4"><button onclick="eliminar('${c[0]}')" class="text-slate-800 hover:text-red-500">✖</button></td>
                </tr>`;
            });

            tbody.innerHTML = html;
            document.getElementById('gananciaDia').innerText = `$${vD.toFixed(2)}`;
            document.getElementById('costoDia').innerText = `$${cD.toFixed(2)}`;
            document.getElementById('netoDia').innerText = `$${(vD-cD).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uM.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uA.toFixed(2)}`;
        }

        function enviarWA(id, tipo) {
            const c = clientesGlobal.find(x => x[0].toString() === id.toString());
            const num = c[2].toString().replace(/\D/g, '');
            const fechaLimpia = c[10].toString().split("T")[0]; 
            
            let msj = "";
            if (tipo === 'datos') {
                const s = c[3].split(" + "), u = c[6].split(" , "), k = c[7].split(" , "), p = c[8].split(" , "), n = c[9].split(" , ");
                let b = ""; s.forEach((ser, i) => {
                    b += `------------------------------\n📺 *SERVICIO:* ${ser}\n✉️ *Usuario:* ${u[i]||u[0]}\n🔑 *Clave:* ${k[i]||k[0]}\n👤 *Perfil:* ${p[i]||p[0]}\n🔐 *PIN:* ${n[i]||n[0]}\n🗓 *Vence:* ${fechaLimpia}\n------------------------------\n`;
                });
                msj = `🚀 *SERVICIOS ACTIVOS - ${c[1]}* ⭐\nGracias por elegir *Planet Streaming*\n\n${b}\n🚨 *REGLAS:* No cambiar datos, usar solo tu perfil asignado. ¡Disfruta! 🍿`;
            } else if (tipo === 3) {
                msj = `Hola *${c[1]}* 👋\n\nRecordatorio de *Planet Streaming* 🚀: tu servicio de *${c[3]}* vence en *3 días* (${fechaLimpia}). ¿Deseas renovar para no perder tu programación? 🍿`;
            } else if (tipo === 0) {
                msj = `¡Hola *${c[1]}*! 🚨\n\nTu servicio de *${c[3]}* **VENCE HOY**. Renueva ahora para evitar el corte de pantalla. ⏳\n\n¡Quedamos atentos!`;
            }
            window.open(`https://api.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(msj)}`);
        }

        async function renovar(id) {
            const c = clientesGlobal.find(x => x[0].toString() === id.toString());
            if (confirm(`¿Renovar 30 días a ${c[1]}?`)) {
                let fv = limpiarYProcesarFecha(c[10]);
                fv.setDate(fv.getDate() + 30);
                const nuevaFecha = fv.toISOString().split('T')[0];
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'UPDATE', id: id, vencimiento: nuevaFecha }) });
                location.reload();
            }
        }

        async function eliminar(id) {
            if(confirm("¿Eliminar registro permanentemente?")) {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
                location.reload();
            }
        }

        window.onload = () => {
            initGrid(); cargar();
            document.getElementById('fechaVencimiento').value = new Date(Date.now() + 2592000000).toISOString().split('T')[0];
        };
    </script>
</body>
</html>
