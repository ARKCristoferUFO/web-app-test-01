<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet | Control Total Extendido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin: 0; padding: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-red { border-left: 4px solid #ef4444; background: linear-gradient(to right, rgba(239, 68, 68, 0.1), transparent); }
        
        /* Botones de Gestión Estilizados */
        .btn-mgmt { 
            display: flex; align-items: center; gap: 4px; padding: 6px 10px; 
            border-radius: 8px; font-size: 10px; font-weight: 800; 
            text-transform: uppercase; transition: all 0.2s;
        }
        .btn-mgmt:hover { transform: translateY(-2px); filter: brightness(1.2); }
        
        /* Ajuste de scrollbar para la tabla */
        .custom-scroll::-webkit-scrollbar { height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-4">
    <div class="w-full mx-auto"> <header class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-6">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Ingresos Hoy</p>
                <p id="ventasBrutas" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>
            
            <div class="glass p-4 rounded-2xl card-red">
                <div class="flex justify-between items-center">
                    <p class="text-[9px] text-red-400 font-bold uppercase tracking-widest">Egresos / Costo</p>
                    <button onclick="registrarEgresoRapido()" class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition-all shadow-lg flex items-center gap-1">
                        <i class="fas fa-plus text-[9px]"></i>
                        <span class="text-[9px] font-black uppercase italic">Gasto</span>
                    </button>
                </div>
                <p id="egresosHoy" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-emerald-500">
                <p class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest">Utilidad Neta Hoy</p>
                <p id="cajaNeto" class="text-xl font-extrabold mt-1 text-emerald-400">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-purple-500">
                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">Utilidad Mes</p>
                <p id="gananciaMes" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-yellow-500">
                <p class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest">Balance Anual</p>
                <p id="gananciaAnio" class="text-xl font-extrabold mt-1 text-yellow-500 font-black">$0.00</p>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-4">
            <div class="lg:w-1/4">
                <div class="glass p-5 rounded-3xl shadow-2xl sticky top-4">
                    <h2 class="text-xs font-black text-blue-400 uppercase tracking-widest mb-4 italic">Panel de Registro</h2>
                    <div class="space-y-3">
                        <input id="nombre" type="text" placeholder="CLIENTE" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none focus:border-blue-500">
                        
                        <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none">
                            <option value="NETFLIX">Netflix</option>
                            <option value="FLUJO TV">Flujo TV</option>
                            <option value="DISNEY+">Disney+</option>
                            <option value="MAX">Max</option>
                            <option value="PRIME VIDEO">Prime Video</option>
                            <option value="YOUTUBE">YouTube</option>
                        </select>

                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[8px] text-slate-500 font-bold ml-1 italic">Costo $</label>
                                <input id="costo" type="number" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-red-900/30 rounded-xl p-3 text-xs outline-none text-red-400 font-bold">
                            </div>
                            <div>
                                <label class="text-[8px] text-slate-500 font-bold ml-1 italic">Venta $</label>
                                <input id="precio" type="number" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-emerald-900/30 rounded-xl p-3 text-xs font-black text-emerald-400 outline-none">
                            </div>
                        </div>

                        <input id="vencimiento" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold text-white outline-none">
                        
                        <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl shadow-lg uppercase text-[10px] tracking-widest transition-all">Registrar Ahora</button>
                    </div>
                </div>
            </div>

            <div class="lg:w-3/4">
                <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                    <div class="p-4 bg-white/5 flex justify-between items-center border-b border-white/5">
                        <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar registros..." class="w-full max-w-md bg-slate-950 border border-slate-800 rounded-2xl px-4 py-2 text-xs outline-none focus:border-blue-500">
                        <div class="flex gap-2">
                             <span class="text-[9px] text-slate-500 uppercase font-black">Control Operativo</span>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto custom-scroll max-h-[700px]">
                        <table class="w-full text-left min-w-[900px]"> <thead class="bg-slate-950/80 text-slate-500 uppercase text-[9px] font-black tracking-widest sticky top-0 z-20">
                                <tr>
                                    <th class="p-4">Cliente / Servicio</th>
                                    <th class="p-4 text-center">Inversión (Costo)</th>
                                    <th class="p-4 text-center">Ingreso (Venta)</th>
                                    <th class="p-4 text-center">Gestión de Cuenta</th>
                                    <th class="p-4 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                clientesGlobal = await res.json();
                renderizarTabla();
            } catch(e) { console.error("Error al sincronizar datos"); }
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vHoy = 0, cHoy = 0, uMes = 0, uAnio = 0;

            let html = "";
            clientesGlobal.forEach(c => {
                const fReg = new Date(parseInt(c[0]));
                const esEgreso = (c[1].toString().toUpperCase() === "EGRESO");
                const costoFila = parseFloat(c[4]) || 0; 
                const ventaFila = parseFloat(c[5]) || 0; 

                // Cálculos Financieros
                if(!isNaN(fReg.getTime())) {
                    const esHoy = fReg.toDateString() === hoy.toDateString();
                    const esMes = fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026;

                    if(esEgreso) {
                        if(esHoy) cHoy += ventaFila;
                        if(esMes) uMes -= ventaFila;
                        uAnio -= ventaFila;
                    } else {
                        if(esHoy) { vHoy += ventaFila; cHoy += costoFila; }
                        if(esMes) uMes += (ventaFila - costoFila);
                        uAnio += (ventaFila - costoFila);
                    }
                }

                if(esEgreso) {
                    html += `
                    <tr class="bg-red-500/10 text-[11px]">
                        <td class="p-4 font-black text-red-400 italic" colspan="3"><i class="fas fa-minus-circle mr-2"></i> GASTO EXTRA: ${c[3]}</td>
                        <td class="p-4 text-center text-red-400 font-black">-$${ventaFila.toFixed(2)}</td>
                        <td class="p-4 text-right"><button onclick="eliminar('${c[0]}')"><i class="fas fa-trash-alt text-slate-700"></i></button></td>
                    </tr>`;
                } else {
                    html += `
                    <tr class="hover:bg-white/5 text-[11px]">
                        <td class="p-4">
                            <div class="flex flex-col">
                                <span class="font-bold text-blue-400 uppercase leading-none text-[12px]">${c[1]}</span>
                                <span class="text-[9px] text-slate-500 mt-1 font-bold tracking-tighter">${c[3]}</span>
                            </div>
                        </td>
                        <td class="p-4 text-center font-mono text-red-400/70 italic font-bold">$${costoFila.toFixed(2)}</td>
                        <td class="p-4 text-center font-mono text-emerald-400 font-black text-[13px]">$${ventaFila.toFixed(2)}</td>
                        <td class="p-4">
                            <div class="flex gap-1 justify-center">
                                <button class="btn-mgmt bg-blue-600 text-white"><i class="fas fa-paper-plane"></i> Entrega</button>
                                <button class="btn-mgmt bg-purple-600 text-white"><i class="fas fa-sync-alt"></i> Renovar</button>
                                <button class="btn-mgmt bg-emerald-600 text-white"><i class="fas fa-dollar-sign"></i> Cobro</button>
                                <button class="btn-mgmt bg-slate-700 text-white"><i class="fab fa-whatsapp"></i></button>
                            </div>
                        </td>
                        <td class="p-4 text-right">
                            <div class="flex gap-3 justify-end items-center">
                                <button onclick="alert('Editar')" class="text-slate-600 hover:text-blue-400"><i class="fas fa-edit"></i></button>
                                <button onclick="eliminar('${c[0]}')" class="text-slate-800 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </td>
                    </tr>`;
                }
            });

            tabla.innerHTML = html;
            document.getElementById('ventasBrutas').innerText = `$${vHoy.toFixed(2)}`;
            document.getElementById('egresosHoy').innerText = `$${cHoy.toFixed(2)}`;
            document.getElementById('cajaNeto').innerText = `$${(vHoy - cHoy).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uAnio.toFixed(2)}`;
        }

        async function registrarEgresoRapido() {
            const m = prompt("Monto del gasto ($):");
            const mo = prompt("Motivo:");
            if(!m || isNaN(m) || !mo) return;
            const data = { id: Date.now(), nombre: "EGRESO", telefono: "0", servicio: mo.toUpperCase(), costo: 0, precio: parseFloat(m), vencimiento: new Date().toISOString().split('T')[0] };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function guardarEnGoogle() {
            const data = { 
                id: Date.now(), 
                nombre: document.getElementById('nombre').value.toUpperCase().trim(), 
                telefono: "0", 
                servicio: document.getElementById('servicio').value, 
                costo: parseFloat(document.getElementById('costo').value) || 0, 
                precio: parseFloat(document.getElementById('precio').value) || 0, 
                vencimiento: document.getElementById('vencimiento').value 
            };
            if(!data.nombre || !data.vencimiento) return alert("Faltan datos");
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function eliminar(id) { if(confirm("¿Eliminar este registro permanentemente?")) { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) }); location.reload(); } }
        window.onload = cargarDatos;
    </script>
</body>
</html>
