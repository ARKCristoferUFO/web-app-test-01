<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .status-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-yellow { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.4); }
        .status-green { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.4); }
        .tabla-contenedor { overflow-x: auto; }
        table { min-width: 900px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-4 font-sans text-[11px]">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6 font-black text-center">
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-lg">
                <p class="text-[9px] text-blue-400 uppercase mb-1">Ventas Hoy</p>
                <p id="gananciaDia" class="text-xl">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-red-900/40 shadow-lg">
                <p class="text-[9px] text-red-400 uppercase mb-1">Inversión Hoy</p>
                <p id="costoDia" class="text-xl text-red-400">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-emerald-500/40 shadow-lg">
                <p class="text-[9px] text-emerald-400 uppercase mb-1">Caja Neta Hoy</p>
                <p id="netoDia" class="text-xl text-emerald-400">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-purple-900/40 shadow-lg">
                <p class="text-[9px] text-purple-400 uppercase mb-1">Utilidad Mes</p>
                <p id="gananciaMes" class="text-xl">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-yellow-500 shadow-lg">
                <p class="text-[9px] text-yellow-500 uppercase mb-1">Balance 2026</p>
                <p id="gananciaAnio" class="text-xl text-yellow-500">$0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-slate-900 p-5 rounded-2xl border border-slate-800 h-fit shadow-xl">
                <h2 class="text-blue-400 font-bold mb-4 uppercase tracking-widest text-[10px]">Nuevo Registro</h2>
                <div class="space-y-3">
                    <input id="nombre" type="text" placeholder="NOMBRE CLIENTE" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold uppercase text-white outline-none">
                    <input id="telefono" type="text" placeholder="WHATSAPP (Ej: 58...)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white outline-none">
                    <select id="servicio" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold text-white">
                        <option>NETFLIX PERFIL</option>
                        <option>NETFLIX PERSONAL</option>
                        <option>DISNEY+</option>
                        <option>MAX</option>
                        <option>PRIME VIDEO</option>
                        <option>PARAMOUNT+</option>
                        <option>IPTV</option>
                        <option>FLUJO TV</option>
                        <option>TELELATINO</option>
                        <option>YOUTUBE</option>
                        <option>SPOTIFY</option>
                        <option>CRUNCHYROLL</option>
                        <option>VIKI RAKUTEN</option>
                        <option>OLEADA TV</option>
                        <option>CANVA PRO</option>
                    </select>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="costo" type="number" step="0.01" placeholder="Costo $" class="bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white">
                        <input id="precio" type="number" step="0.01" placeholder="Venta $" class="bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold text-green-400">
                    </div>
                    <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 space-y-2 text-white">
                        <input id="correo" type="text" placeholder="Usuario / Correo" class="w-full bg-transparent border-b border-slate-800 p-1 outline-none">
                        <input id="clave" type="text" placeholder="Contraseña" class="w-full bg-transparent border-b border-slate-800 p-1 outline-none">
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input id="perfil" type="text" placeholder="Perfil" class="bg-slate-800 p-1 rounded text-[9px]">
                            <input id="pin" type="text" placeholder="PIN" class="bg-slate-800 p-1 rounded text-[9px]">
                        </div>
                    </div>
                    <input id="vencimiento" type="date" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold text-white">
                    <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-3 rounded-xl uppercase shadow-lg">Guardar Registro</button>
                </div>
            </div>

            <div class="lg:col-span-3 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
                <div class="p-4 border-b border-slate-800">
                    <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="Buscar cliente..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white outline-none">
                </div>
                <div class="tabla-contenedor max-h-[600px]">
                    <table class="w-full text-left">
                        <thead class="bg-slate-950 text-slate-500 uppercase text-[9px] tracking-widest sticky top-0">
                            <tr>
                                <th class="p-4">Cliente / Servicio</th>
                                <th class="p-4 text-center">Estado</th>
                                <th class="p-4 text-center">Vence</th>
                                <th class="p-4 text-center">Acciones</th>
                                <th class="p-4 text-center">X</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="divide-y divide-slate-800 text-white font-bold uppercase">
                            <tr><td colspan="5" class="p-20 text-center loading uppercase font-black">Sincronizando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        // FUNCIÓN PARA PONER FECHA +30 DÍAS AL ABRIR
        function establecerFechaPredeterminada() {
            const fechaFutura = new Date();
            fechaFutura.setDate(fechaFutura.getDate() + 30);
            document.getElementById('vencimiento').value = fechaFutura.toISOString().split('T')[0];
        }

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                clientesGlobal = await res.json();
                renderizarTabla();
            } catch(e) { console.error(e); }
        }

        function procesarFecha(valor) {
            if (!valor) return new Date(0);
            if (!isNaN(valor) && typeof valor !== 'string') return new Date((valor - 25569) * 86400 * 1000);
            if (valor.toString().includes('T')) return new Date(valor);
            let partes = valor.toString().split(/[-/]/);
            if (partes.length === 3) {
                if (partes[0].length === 4) return new Date(partes[0], partes[1] - 1, partes[2]);
                return new Date(partes[2], partes[1] - 1, partes[0]);
            }
            return new Date(valor);
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vDia = 0, cDia = 0, uMes = 0, uAnio = 0;

            let filtrados = clientesGlobal.filter(c => 
                c[1].toString().toLowerCase().includes(busqueda) || 
                c[3].toString().toLowerCase().includes(busqueda)
            );

            let html = "";
            filtrados.forEach(c => {
                const fechaV = procesarFecha(c[10]);
                const diff = fechaV.getTime() - hoy.getTime();
                const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
                const fReg = new Date(parseInt(c[0]));
                const costoItem = parseFloat(c[4]) || 0;
                const ventaItem = parseFloat(c[5]) || 0;
                const gan = ventaItem - costoItem;

                if(!isNaN(fReg.getTime())) {
                    if(fReg.toDateString() === hoy.toDateString()) { vDia += ventaItem; cDia += costoItem; }
                    if(fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026) uMes += gan;
                    if(fReg.getFullYear() === 2026) uAnio += gan;
                }

                let clse = dias <= 0 ? "status-red" : (dias <= 3 ? "status-yellow" : "status-green");
                let fechaTxt = isNaN(fechaV.getTime()) ? "ERROR" : fechaV.toISOString().split('T')[0];

                html += `
                    <tr class="hover:bg-slate-800/40 border-b border-slate-800/50 transition-colors">
                        <td class="p-4 text-blue-400 font-bold uppercase">${c[1]}<br><span class="text-slate-500 font-black">${c[3]}</span></td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded-full border font-black ${clse}">
                                ${dias <= 0 ? (dias === 0 ? 'VENCE HOY' : 'VENCIDO') : dias + ' DIAS'}
                            </span>
                        </td>
                        <td class="p-4 text-center text-slate-500 font-mono">${fechaTxt}</td>
                        <td class="p-4 text-center space-x-1">
                            <button onclick="wsAcceso('${c[0]}')" class="bg-blue-600 px-3 py-1.5 rounded font-black uppercase shadow-md">Entrega</button>
                            <button onclick="renovar('${c[0]}')" class="bg-indigo-600 px-3 py-1.5 rounded font-black uppercase shadow-md">Renovar</button>
                            <button onclick="wsCobro('${c[0]}')" class="bg-green-600 px-3 py-1.5 rounded font-black uppercase shadow-md">Cobro</button>
                        </td>
                        <td class="p-4 text-center"><button onclick="eliminar('${c[0]}')" class="text-slate-700 hover:text-red-500 font-bold text-lg">✖</button></td>
                    </tr>`;
            });

            tabla.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center uppercase font-black">No hay registros</td></tr>';
            
            document.getElementById('gananciaDia').innerText = `$${vDia.toFixed(2)}`;
            document.getElementById('costoDia').innerText = `$${cDia.toFixed(2)}`;
            document.getElementById('netoDia').innerText = `$${(vDia - cDia).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uAnio.toFixed(2)}`;
        }

        async function guardarEnGoogle() {
            const btn = document.getElementById('btnGuardar');
            const data = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                telefono: document.getElementById('telefono').value.trim(),
                servicio: document.getElementById('servicio').value,
                costo: document.getElementById('costo').value || 0,
                precio: document.getElementById('precio').value || 0,
                correo: document.getElementById('correo').value.trim(),
                clave: document.getElementById('clave').value.trim(),
                perfil: document.getElementById('perfil').value.trim(),
                pin: document.getElementById('pin').value.trim(),
                vencimiento: document.getElementById('vencimiento').value
            };
            btn.innerText = "ESPERE...";
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function renovar(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            if(!c) return;

            const hoy = new Date();
            let fechaVencActual = procesarFecha(c[10]);
            
            // Lógica Acumulativa: si le quedan días, los suma a los 30.
            let nuevaFecha;
            if (fechaVencActual > hoy) {
                nuevaFecha = new Date(fechaVencActual.getTime() + (30 * 24 * 60 * 60 * 1000));
            } else {
                nuevaFecha = new Date(hoy.getTime() + (30 * 24 * 60 * 60 * 1000));
            }

            const nuevaFechaStr = nuevaFecha.toISOString().split('T')[0];
            if(!confirm("¿Sumar 30 días adicionales? Nueva fecha: " + nuevaFechaStr)) return;

            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
                action: 'UPDATE_FIELD', 
                id: id, 
                vencimiento: nuevaFechaStr 
            }) });
            location.reload();
        }

        async function eliminar(id) {
            if(!confirm("¿Eliminar?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
            location.reload();
        }

        function wsAcceso(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const fechaV = procesarFecha(c[10]).toISOString().split('T')[0];
            
            const msj = "\uD83D\uDE80 *SERVICIOS ACTIVOS - " + c[1] + "* \u2B50\n" +
                        "Gracias por tu compra en Streaming Planet\n\n" +
                        "------------------------------\n" +
                        "\uD83D\uDCFA *SERVICIO:* " + c[3] + "\n" +
                        "\u2709\uFE0F *Usuario:* " + c[6] + "\n" +
                        "\uD83D\uDD11 *Clave:* " + c[7] + "\n" +
                        "\uD83D\uDC64 *Perfil:* " + c[8] + "\n" +
                        "\uD83D\uDD10 *PIN:* " + c[9] + "\n" +
                        "\uD83D\uDDD3 *Vence:* " + fechaV + "\n" +
                        "------------------------------\n\n" +
                        "\uD83D\uDEA8 *REGLAS IMPORTANTES:*\n" +
                        "* No cambiar datos de la cuenta.\n" +
                        "* Usar solo el perfil asignado.\n" +
                        "* Disfruta tu programación \uD83C\uDF7F";
            
            abrirWS(c[2], msj);
        }

        function wsCobro(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const fechaV = procesarFecha(c[10]);
            const diff = fechaV.getTime() - hoy.getTime();
            const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
            
            let msj = "";
            if (dias <= 0) {
                msj = "\u00A1Hola, " + c[1] + "! \uD83D\uDC4B \u00BFCOmo est\u00E1s? Te escribimos para recordarte que tu plan de " + c[3] + " \uD83C\uDF7F termina hoy. \uD83D\uDE31\n\n" +
                      "Si quieres continuar viendo todo el contenido, solo tienes que contactarnos \uD83D\uDCF2 para reactivar tu cuenta.\n" +
                      "\u00A1Te esperamos! \u2728";
            } else {
                msj = "Hola " + c[1] + ", a tu servicio de " + c[3] + " *le queda *" + dias + " d\u00EDas de servicio. Recuerda que puedes renovar por este medio.";
            }
            abrirWS(c[2], msj);
        }

        function abrirWS(tel, msj) {
            const fTel = tel.toString().replace(/\D/g, '');
            const msjFinal = encodeURIComponent(msj);
            window.open("https://api.whatsapp.com/send?phone=" + fTel + "&text=" + msjFinal, "_blank");
        }

        window.onload = function() {
            cargarDatos();
            establecerFechaPredeterminada();
        };
    </script>
</body>
</html>
