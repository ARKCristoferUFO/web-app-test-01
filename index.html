<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet | Control Financiero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .bg-netflix { background: #E50914; }
        .bg-disney { background: #006E99; }
        .bg-max { background: #0047FF; }
        .bg-prime { background: #00A8E1; }
        .bg-spotify { background: #1DB954; }
        .bg-youtube { background: #FF0000; }
        .bg-magis { background: #6366F1; }
        .bg-iptv { background: #F59E0B; }
        .bg-canva { background: #7D2AE8; }
        .bg-paramount { background: #0064FF; }
        .bg-egreso { background: #ef4444; }
        .btn-ws { transition: all 0.3s; cursor: pointer; }
        .btn-ws:hover { transform: translateY(-2px); filter: brightness(1.2); }
    </style>
</head>
<body class="text-slate-100 p-4 md:p-6">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Ventas (Cobrado Hoy)</p>
                <p id="ventasBrutas" class="text-xl font-extrabold mt-1 text-white">$0.00</p>
            </div>
            
            <div class="glass p-4 rounded-3xl border-l-4 border-red-500 bg-red-500/5">
                <div class="flex justify-between items-center">
                    <p class="text-[9px] text-red-400 font-bold uppercase tracking-widest">Egresos (Costos Hoy)</p>
                    <button onclick="registrarEgresoRapido()" class="bg-red-500 text-[10px] px-2 py-0.5 rounded-lg hover:bg-red-400 transition-all">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <p id="egresosHoy" class="text-xl font-extrabold mt-1 text-white">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-emerald-500 bg-emerald-500/5">
                <p class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest">Caja Neta (Ganancia Real)</p>
                <p id="cajaNeto" class="text-xl font-extrabold mt-1 text-emerald-400">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-purple-500">
                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">Utilidad Mes</p>
                <p id="gananciaMes" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>

            <div class="glass p-4 rounded-3xl border-l-4 border-yellow-500">
                <p class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest">Utilidad Año</p>
                <p id="gananciaAnio" class="text-xl font-extrabold mt-1 text-yellow-500 font-black">$0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3">
                <div class="glass p-6 rounded-3xl shadow-2xl sticky top-4">
                    <h2 class="text-xs font-black text-blue-400 uppercase tracking-widest mb-4 italic">Planet Register</h2>
                    <div class="space-y-3">
                        <input id="nombre" type="text" placeholder="NOMBRE CLIENTE" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none focus:border-blue-500">
                        <input id="telefono" type="text" placeholder="WHATSAPP" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold outline-none uppercase">
                            <option value="NETFLIX">Netflix</option><option value="DISNEY+">Disney+</option>
                            <option value="MAX">Max</option><option value="PRIME VIDEO">Prime Video</option>
                            <option value="PARAMOUNT+">Paramount+</option><option value="IPTV">IPTV</option>
                            <option value="MAGIS TV">Magis TV</option><option value="YOUTUBE">YouTube</option>
                            <option value="SPOTIFY">Spotify</option><option value="CANVA PRO">Canva Pro</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="costo" type="number" step="0.01" placeholder="Costo $" class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                            <input id="precio" type="number" step="0.01" placeholder="Venta $" class="bg-slate-900 border border-emerald-900/40 rounded-xl p-3 text-xs font-bold text-emerald-400 outline-none">
                        </div>
                        <div class="bg-slate-950 p-4 rounded-2xl border border-white/5 space-y-2">
                            <input id="correo" type="text" placeholder="Correo" class="w-full bg-transparent border-b border-slate-800 p-1 text-[11px] outline-none">
                            <input id="clave" type="text" placeholder="Clave" class="w-full bg-transparent border-b border-slate-800 p-1 text-[11px] outline-none">
                            <div class="grid grid-cols-2 gap-2 mt-2">
                                <input id="perfil" type="text" placeholder="Perfil" class="bg-slate-800 p-2 rounded-lg text-[10px] outline-none">
                                <input id="pin" type="text" placeholder="PIN" class="bg-slate-800 p-2 rounded-lg text-[10px] outline-none">
                            </div>
                        </div>
                        <input id="vencimiento" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold text-white outline-none">
                        <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl shadow-lg uppercase text-[10px] tracking-widest">Registrar Venta</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="glass rounded-3xl shadow-2xl overflow-hidden">
                    <div class="p-4 bg-white/5 border-b border-white/5">
                        <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar registros de hoy..." class="w-full max-w-sm bg-slate-950 border border-slate-800 rounded-2xl px-4 py-2 text-xs outline-none focus:border-blue-500">
                    </div>
                    <div class="overflow-x-auto max-h-[650px]">
                        <table class="w-full text-left">
                            <thead class="bg-slate-950/50 text-slate-500 uppercase text-[9px] font-black tracking-widest sticky top-0 z-10">
                                <tr>
                                    <th class="p-5">Servicio</th>
                                    <th class="p-5 text-center">Estado</th>
                                    <th class="p-5">Vence</th>
                                    <th class="p-5 text-center">Gestión</th>
                                    <th class="p-5"></th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        const PLATAFORMAS = {
            "NETFLIX": { icon: "fab fa-netflix", color: "bg-netflix" },
            "DISNEY+": { icon: "fas fa-wand-sparkles", color: "bg-disney" },
            "MAX": { icon: "fas fa-bolt", color: "bg-max" },
            "PRIME VIDEO": { icon: "fab fa-amazon", color: "bg-prime" },
            "SPOTIFY": { icon: "fab fa-spotify", color: "bg-spotify" },
            "YOUTUBE": { icon: "fab fa-youtube", color: "bg-youtube" },
            "MAGIS TV": { icon: "fas fa-play", color: "bg-magis" },
            "IPTV": { icon: "fas fa-satellite-dish", color: "bg-iptv" },
            "CANVA PRO": { icon: "fas fa-palette", color: "bg-canva" },
            "PARAMOUNT+": { icon: "fas fa-mountain", color: "bg-paramount" },
            "EGRESO": { icon: "fas fa-minus-circle", color: "bg-egreso" }
        };

        async function cargarDatos() {
            const res = await fetch(API_URL);
            clientesGlobal = await res.json();
            renderizarTabla();
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            // CONTADORES
            let cobradoHoy = 0, costoHoy = 0, gananciaMes = 0, gananciaAnio = 0;

            let filtrados = clientesGlobal.filter(c => c[1].toString().toLowerCase().includes(busqueda) || c[3].toString().toLowerCase().includes(busqueda));

            let html = "";
            filtrados.forEach(c => {
                const fVence = procesarFecha(c[10]);
                const fReg = new Date(parseInt(c[0]));
                const esEgreso = (c[1].toString().toUpperCase() === "EGRESO");
                const costo = parseFloat(c[4]) || 0;
                const venta = parseFloat(c[5]) || 0;
                
                if(!isNaN(fReg.getTime())) {
                    const esDeHoy = (fReg.toDateString() === hoy.toDateString());
                    const esDeMes = (fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026);

                    if(esEgreso) {
                        if(esDeHoy) costoHoy += venta; // Si es fila EGRESO, el monto está en campo 'precio'
                        if(esDeMes) gananciaMes -= venta;
                        gananciaAnio -= venta;
                    } else {
                        if(esDeHoy) {
                            cobradoHoy += venta;
                            costoHoy += costo; // SUMA EL COSTO DE LA CUENTA COMO EGRESO
                        }
                        if(esDeMes) gananciaMes += (venta - costo);
                        gananciaAnio += (venta - costo);
                    }
                }

                // Render...
                const plat = PLATAFORMAS[c[3].toUpperCase()] || { icon: "fas fa-tv", color: "bg-slate-700" };
                const diff = fVence.getTime() - hoy.getTime();
                const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
                let colorStatus = dias <= 0 ? "text-red-500 border-red-500/20 bg-red-500/10" : (dias <= 3 ? "text-yellow-500 border-yellow-500/20 bg-yellow-500/10" : "text-emerald-500 border-emerald-500/20 bg-emerald-500/10");

                if(esEgreso) {
                    html += `<tr class="bg-red-500/5 text-[11px]"><td class="p-5 text-red-400 font-black"><i class="fas fa-minus-circle mr-2"></i> GASTO: ${c[3]}</td><td class="p-5 text-center text-[9px] uppercase">Gasto Externo</td><td class="p-5">--</td><td class="p-5 text-center font-black">-$ ${venta.toFixed(2)}</td><td class="p-5 text-right"><button onclick="eliminar('${c[0]}')">🗑️</button></td></tr>`;
                } else {
                    html += `<tr class="hover:bg-white/5 text-[11px]"><td class="p-5"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg ${plat.color} flex items-center justify-center text-white"><i class="${plat.icon}"></i></div><div><p class="font-bold text-blue-400 uppercase">${c[1]}</p><p class="text-[9px] text-slate-500">${c[3]}</p></div></div></td><td class="p-5 text-center"><span class="px-2 py-0.5 rounded border ${colorStatus}">${dias <= 0 ? 'Vencido' : dias + ' DÍAS'}</span></td><td class="p-5 font-mono text-slate-500 font-bold">${fVence.toISOString().split('T')[0]}</td><td class="p-5 text-center"><button class="bg-blue-600/10 text-blue-400 px-3 py-1 rounded-lg text-[10px] font-black">GESTIÓN</button></td><td class="p-5 text-right"><button onclick="eliminar('${c[0]}')">🗑️</button></td></tr>`;
                }
            });

            tabla.innerHTML = html;
            document.getElementById('ventasBrutas').innerText = `$${cobradoHoy.toFixed(2)}`;
            document.getElementById('egresosHoy').innerText = `$${costoHoy.toFixed(2)}`;
            document.getElementById('cajaNeto').innerText = `$${(cobradoHoy - costoHoy).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${gananciaMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${gananciaAnio.toFixed(2)}`;
        }

        async function registrarEgresoRapido() {
            const monto = prompt("Monto del gasto ($):");
            const motivo = prompt("Motivo:");
            if(!monto || isNaN(monto) || !motivo) return;
            const data = { id: Date.now(), nombre: "EGRESO", telefono: "0", servicio: motivo.toUpperCase(), costo: 0, precio: parseFloat(monto), correo: "-", clave: "-", perfil: "-", pin: "-", vencimiento: new Date().toISOString().split('T')[0] };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        function procesarFecha(valor) {
            if (!valor) return new Date(0);
            if (!isNaN(valor) && typeof valor !== 'string') return new Date((valor - 25569) * 86400 * 1000);
            return new Date(valor);
        }

        async function guardarEnGoogle() {
            const data = { id: Date.now(), nombre: document.getElementById('nombre').value.toUpperCase().trim(), telefono: document.getElementById('telefono').value, servicio: document.getElementById('servicio').value, costo: document.getElementById('costo').value || 0, precio: document.getElementById('precio').value || 0, correo: document.getElementById('correo').value, clave: document.getElementById('clave').value, perfil: document.getElementById('perfil').value, pin: document.getElementById('pin').value, vencimiento: document.getElementById('vencimiento').value };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function eliminar(id) { if(confirm("¿Eliminar?")) { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) }); location.reload(); } }

        window.onload = cargarDatos;
    </script>
</body>
</html>
