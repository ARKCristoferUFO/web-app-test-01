<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet | Sistema JINETH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tabla-scroll-container { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        .tabla-fija { min-width: 1000px; width: 100%; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500"><p class="text-[9px] text-blue-400 font-bold uppercase italic">Ventas Hoy</p><p id="ventasBrutas" class="text-xl font-extrabold mt-1">$0.00</p></div>
            <div class="glass p-4 rounded-3xl border-l-4 border-red-500"><p class="text-[9px] text-red-400 font-bold uppercase italic">Costos</p><p id="egresosHoy" class="text-xl font-extrabold mt-1">$0.00</p></div>
            <div class="glass p-4 rounded-3xl border-l-4 border-emerald-500 text-emerald-400"><p class="text-[9px] font-bold uppercase italic">Caja Neta</p><p id="cajaNeto" class="text-xl font-extrabold mt-1">$0.00</p></div>
            <div class="glass p-4 rounded-3xl border-l-4 border-purple-500 text-purple-400"><p class="text-[9px] font-bold uppercase italic">Utilidad Mes</p><p id="gananciaMes" class="text-xl font-extrabold mt-1">$0.00</p></div>
            <div class="glass p-4 rounded-3xl border-l-4 border-yellow-500 text-yellow-500"><p class="text-[9px] font-bold uppercase italic">Balance Año</p><p id="gananciaAnio" class="text-xl font-extrabold mt-1">$0.00</p></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3">
                <div class="glass p-6 rounded-3xl shadow-2xl sticky top-6">
                    <h2 class="text-xs font-black text-blue-400 uppercase mb-4 italic">Venta y Entrega Inmediata</h2>
                    <div class="space-y-3">
                        <input id="nombre" type="text" placeholder="CLIENTE" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none">
                        <input id="telefono" type="text" placeholder="WHATSAPP (Ej: 58412...)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none">
                            <option value="NETFLIX">Netflix</option>
                            <option value="PRIME VIDEO">Prime Video</option>
                            <option value="DISNEY+">Disney+</option>
                            <option value="MAX">Max</option>
                            <option value="FLUJO TV">Flujo TV</option>
                        </select>
                        <input id="correo" type="text" placeholder="USUARIO / CORREO" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="clave" type="text" placeholder="CLAVE" class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                            <input id="perfil" type="text" placeholder="PERFIL" class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="costo" type="number" step="0.01" placeholder="COSTO $" class="bg-slate-900 border border-red-900/30 rounded-xl p-3 text-xs text-red-400 outline-none">
                            <input id="precio" type="number" step="0.01" placeholder="VENTA $" class="bg-slate-900 border border-emerald-900/30 rounded-xl p-3 text-xs text-emerald-400 font-black outline-none">
                        </div>
                        <input id="vencimiento" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold text-white outline-none">
                        
                        <button onclick="registrarYEnviar()" id="btnAccion" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl shadow-lg uppercase text-[10px] tracking-widest italic transition-all">
                            Registrar y Enviar Cliente
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="glass rounded-3xl shadow-2xl overflow-hidden">
                    <div class="p-4 bg-white/5 border-b border-white/5">
                        <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar registros..." class="w-full max-w-sm bg-slate-950 border border-slate-800 rounded-2xl px-4 py-2 text-xs outline-none focus:border-blue-500">
                    </div>
                    <div class="tabla-scroll-container">
                        <table class="tabla-fija text-left">
                            <thead class="bg-slate-950/50 text-slate-500 uppercase text-[9px] font-black tracking-widest">
                                <tr>
                                    <th class="p-5">Cliente / Servicio</th>
                                    <th class="p-5 text-center">Costo</th>
                                    <th class="p-5 text-center">Venta</th>
                                    <th class="p-5 text-right">Borrar</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        async function cargarDatos() {
            const res = await fetch(API_URL);
            clientesGlobal = await res.json();
            renderizarTabla();
        }

        async function registrarYEnviar() {
            const btn = document.getElementById('btnAccion');
            const data = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                telefono: document.getElementById('telefono').value.trim(),
                servicio: document.getElementById('servicio').value,
                usuario: document.getElementById('correo').value.trim(),
                clave: document.getElementById('clave').value.trim(),
                perfil: document.getElementById('perfil').value.trim() || "1",
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio: parseFloat(document.getElementById('precio').value) || 0,
                vencimiento: document.getElementById('vencimiento').value
            };

            if(!data.nombre || !data.telefono || !data.vencimiento) return alert("Faltan datos del cliente");

            btn.innerText = "REGISTRANDO..."; btn.disabled = true;

            // 1. Guardar en Google Sheets
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

            // 2. Armar formato JINETH y enviar a WhatsApp
            const msg = `⭐ SERVICIOS ACTIVOS - JINETH ⭐\n------------------------------\n📺 SERVICIO: ${data.servicio}\n👤 Usuario: ${data.usuario}\n🔑 Clave: ${data.clave}\n👤 Perfil: ${data.perfil}\n📌 PIN: No\n🗓️ Vence: ${data.vencimiento}\n------------------------------\n\n⚠️ REGLAS IMPORTANTES:\n- No cambiar datos de la cuenta.\n- Usar solo el perfil asignado.\n\nGracias por tu compra en Planet Streaming 🍿`;
            
            const numLimpio = data.telefono.replace(/\D/g, '');
            window.open(`https://api.whatsapp.com/send?phone=${numLimpio}&text=${encodeURIComponent(msg)}`, '_blank');

            location.reload();
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vHoy = 0, cHoy = 0, uMes = 0, uAnio = 0;

            let html = "";
            clientesGlobal.forEach(c => {
                const fReg = new Date(parseInt(c[0]));
                const esEgreso = (c[1] === "EGRESO");
                const costoVal = parseFloat(c[4]) || 0; 
                const ventaVal = parseFloat(c[5]) || 0; 

                if(!isNaN(fReg.getTime())) {
                    const esHoy = fReg.toDateString() === hoy.toDateString();
                    if(esEgreso) { if(esHoy) cHoy += ventaVal; uAnio -= ventaVal; }
                    else { if(esHoy) { vHoy += ventaVal; cHoy += costoVal; } uAnio += (ventaVal - costoVal); }
                }

                html += `<tr class="hover:bg-white/5 text-[11px]">
                    <td class="p-5 font-bold text-blue-400">${c[1]} <span class="text-slate-500 font-normal ml-2">${c[3]}</span></td>
                    <td class="p-5 text-center text-red-400">$${costoVal.toFixed(2)}</td>
                    <td class="p-5 text-center text-emerald-400 font-bold">$${ventaVal.toFixed(2)}</td>
                    <td class="p-5 text-right"><button onclick="eliminar('${c[0]}')" class="text-slate-700 hover:text-red-500"><i class="fas fa-trash"></i></button></td>
                </tr>`;
            });
            tabla.innerHTML = html;
            document.getElementById('ventasBrutas').innerText = `$${vHoy.toFixed(2)}`;
            document.getElementById('egresosHoy').innerText = `$${cHoy.toFixed(2)}`;
            document.getElementById('cajaNeto').innerText = `$${(vHoy - cHoy).toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uAnio.toFixed(2)}`;
        }

        async function eliminar(id) { if(confirm("¿Borrar?")) { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) }); location.reload(); } }
        window.onload = cargarDatos;
    </script>
</body>
</html>
