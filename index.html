<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .status-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-yellow { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.4); }
        .status-green { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.4); }
        .tabla-contenedor { overflow-x: auto; }
        table { min-width: 900px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-4 font-sans text-[11px]">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6 font-black text-center">
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-lg">
                <p class="text-[9px] text-blue-400 uppercase mb-1">Ventas Hoy</p>
                <p id="gananciaDia" class="text-xl">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-red-900/40 shadow-lg">
                <p class="text-[9px] text-red-400 uppercase mb-1">Inversión Hoy</p>
                <p id="costoDia" class="text-xl text-red-400">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-emerald-500/40 shadow-lg">
                <p class="text-[9px] text-emerald-400 uppercase mb-1">Caja Neta Hoy</p>
                <p id="netoDia" class="text-xl text-emerald-400">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-purple-900/40 shadow-lg">
                <p class="text-[9px] text-purple-400 uppercase mb-1">Utilidad Mes</p>
                <p id="gananciaMes" class="text-xl">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-yellow-500 shadow-lg">
                <p class="text-[9px] text-yellow-500 uppercase mb-1">Balance 2026</p>
                <p id="gananciaAnio" class="text-xl text-yellow-500">$0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-slate-900 p-5 rounded-2xl border border-slate-800 h-fit shadow-xl">
                <h2 class="text-blue-400 font-bold mb-4 uppercase tracking-widest text-[10px]">Nuevo Registro Múltiple / Lotes</h2>
                <div class="space-y-3">
                    <input id="nombre" type="text" placeholder="NOMBRE CLIENTE" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold uppercase text-white outline-none">
                    <input id="telefono" type="text" placeholder="WHATSAPP (Ej: 58...)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white outline-none">
                    <input id="vencimiento" type="date" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold text-white">
                    
                    <div class="border border-slate-800 p-3 rounded-xl bg-slate-950/50 space-y-2">
                        <p class="text-[9px] text-blue-400 font-black uppercase">Configurar Plataforma</p>
                        
                        <div class="grid grid-cols-3 gap-2">
                            <div class="col-span-2">
                                <select id="servicio" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 font-bold text-white text-[10px]">
                                    <option>NETFLIX</option>
                                    <option>DISNEY+ PREMIUM</option>
                                    <option>DISNEY+ STANDARD</option>
                                    <option>MAX</option>
                                    <option>PRIME VIDEO</option>
                                    <option>PARAMOUNT+</option>
                                    <option>UNIVERSAL PLUS</option>
                                    <option>APPLE TV</option>
                                    <option>CRUNCHYROLL</option>
                                    <option>VIKI RAKUTEN</option>
                                    <option>VIX</option>
                                    <option>TELELATINO</option>
                                    <option>OLEADA TV</option>
                                    <option>MEGA TV</option>
                                    <option>MAGIS TV</option>
                                    <option>IPTV</option>
                                    <option>YOUTUBE</option>
                                    <option>SPOTIFY</option>
                                    <option>DEEZER</option>
                                    <option>CANVA PRO</option>
                                    <option>CAPCUT PRO</option>
                                    <option>ADOBE CLOUD</option>
                                    <option>LICENCIA OFFICE</option>
                                    <option>CHAT GPT</option>
                                    <option>GEMINI PRO</option>
                                    <option>DUOLINGO</option>
                                    <option>PORN HUB</option>
                                </select>
                            </div>
                            <div>
                                <input id="cantidad" type="number" min="1" value="1" onchange="generarCamposCredenciales()" onkeyup="generarCamposCredenciales()" placeholder="Cant." class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-center text-white font-black text-[10px]">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <input id="costo" type="number" step="0.01" placeholder="Costo Unitario $" class="bg-slate-800 border border-slate-700 rounded-lg p-2 text-white text-[10px]">
                            <input id="precio" type="number" step="0.01" placeholder="Venta Unitaria $" class="bg-slate-800 border border-slate-700 rounded-lg p-2 font-bold text-green-400 text-[10px]">
                        </div>

                        <input id="correo" type="text" placeholder="Usuario Base / Correo" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white text-[10px] outline-none">
                        
                        <div id="contenedorCredencialesDinamicas" class="space-y-2 pt-1 max-h-[220px] overflow-y-auto pr-1"></div>

                        <button type="button" onclick="agregarAlCarrito()" class="w-full bg-slate-800 hover:bg-slate-700 text-blue-400 font-black py-1.5 rounded-lg border border-slate-700 uppercase tracking-wider text-[9px] mt-2 transition-all">➕ Añadir al Carrito</button>
                    </div>

                    <div class="bg-slate-950 p-3 rounded-xl border border-slate-800">
                        <p class="text-[9px] text-slate-400 font-black uppercase mb-2">Resumen del Carrito (<span id="cuentaCarrito">0</span> Cuentas)</p>
                        <div id="listaCarrito" class="space-y-1.5 max-h-[150px] overflow-y-auto pr-1 text-slate-400 italic text-[10px]">
                            Ningún servicio añadido aún.
                        </div>
                    </div>

                    <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-3 rounded-xl uppercase shadow-lg tracking-widest text-[12px]">Guardar Todo el Lote</button>
                </div>
            </div>

            <div class="lg:col-span-3 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
                <div class="p-4 border-b border-slate-800">
                    <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="Buscar cliente..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white outline-none">
                </div>
                <div class="tabla-contenedor max-h-[600px]">
                    <table class="w-full text-left">
                        <thead class="bg-slate-950 text-slate-500 uppercase text-[9px] tracking-widest sticky top-0">
                            <tr>
                                <th class="p-4">Cliente / Servicios Registrados</th>
                                <th class="p-4 text-center">Estado</th>
                                <th class="p-4 text-center">Vence</th>
                                <th class="p-4 text-center">Acciones</th>
                                <th class="p-4 text-center">X</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="divide-y divide-slate-800 text-white font-bold uppercase">
                            <tr><td colspan="5" class="p-20 text-center loading uppercase font-black">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];
        let carritoServicios = []; 

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                clientesGlobal = await res.json();
                renderizarTabla();
            } catch(e) { console.error(e); }
        }

        function procesarFecha(valor) {
            if (!valor) return new Date(0);
            if (!isNaN(valor) && typeof valor !== 'string') return new Date((valor - 25569) * 86400 * 1000);
            if (valor.toString().includes('T')) return new Date(valor);
            let partes = valor.toString().split(/[-/]/);
            if (partes.length === 3) {
                if (partes[0].length === 4) return new Date(partes[0], partes[1] - 1, partes[2]);
                return new Date(partes[2], partes[1] - 1, partes[0]);
            }
            return new Date(valor);
        }

        function generarCamposCredenciales() {
            const contenedor = document.getElementById('contenedorCredencialesDinamicas');
            const cantidad = parseInt(document.getElementById('cantidad').value) || 1;
            if (cantidad < 1) return;
            
            let html = "";
            for (let i = 1; i <= cantidad; i++) {
                html += `
                    <div class="bg-slate-900/90 p-2 rounded-lg border border-slate-700/60 space-y-1.5 relative">
                        <span class="absolute top-1 right-2 text-[8px] text-slate-500 font-black">N° ${i}</span>
                        <input type="text" placeholder="Contraseña Cuenta ${i}" class="clave-dinamica w-full bg-slate-800 border border-slate-700 rounded p-1 text-white text-[10px] outline-none">
                        <div class="grid grid-cols-2 gap-1.5">
                            <input type="text" placeholder="Perfil" class="perfil-dinamica bg-slate-800 p-1 rounded border border-slate-700 text-[10px] text-white">
                            <input type="text" placeholder="PIN" class="pin-dinamica bg-slate-800 p-1 rounded border border-slate-700 text-[10px] text-white">
                        </div>
                    </div>
                `;
            }
            contenedor.innerHTML = html;
        }

        function agregarAlCarrito() {
            const servicio = document.getElementById('servicio').value;
            const cantidad = parseInt(document.getElementById('cantidad').value) || 1;
            const costoUnitario = parseFloat(document.getElementById('costo').value) || 0;
            const precioUnitario = parseFloat(document.getElementById('precio').value) || 0;
            const correoBase = document.getElementById('correo').value.trim();

            if (!correoBase) {
                alert("Por favor ingresa el Usuario o Correo electrónico base.");
                return;
            }

            const inputsClave = document.querySelectorAll('.clave-dinamica');
            const inputsPerfil = document.querySelectorAll('.perfil-dinamica');
            const inputsPin = document.querySelectorAll('.pin-dinamica');

            for (let i = 0; i < cantidad; i++) {
                const clave = inputsClave[i] ? inputsClave[i].value.trim() : "";
                const perfil = (inputsPerfil[i] && inputsPerfil[i].value.trim()) ? inputsPerfil[i].value.trim() : 'N/A';
                const pin = (inputsPin[i] && inputsPin[i].value.trim()) ? inputsPin[i].value.trim() : 'N/A';

                if (!clave) {
                    alert(`Falta rellenar la contraseña para la cuenta número ${i + 1}`);
                    return;
                }

                carritoServicios.push({
                    servicio: servicio,
                    costo: costoUnitario,
                    precio: precioUnitario,
                    correo: correoBase,
                    clave: clave,
                    perfil: perfil,
                    pin: pin
                });
            }

            actualizarVistaCarrito();
            document.getElementById('cantidad').value = 1;
            document.getElementById('costo').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('correo').value = '';
            generarCamposCredenciales();
        }

        function quitarDelCarrito(index) {
            carritoServicios.splice(index, 1);
            actualizarVistaCarrito();
        }

        function actualizarVistaCarrito() {
            const contenedor = document.getElementById('listaCarrito');
            const contador = document.getElementById('cuentaCarrito');
            contador.innerText = carritoServicios.length;

            if (carritoServicios.length === 0) {
                contenedor.innerHTML = 'Ningún servicio añadido aún.';
                return;
            }

            let html = "";
            carritoServicios.forEach((item, index) => {
                html += `
                    <div class="flex justify-between items-center bg-slate-800/60 p-1.5 rounded border border-slate-700/50 font-bold text-white uppercase text-[10px]">
                        <div>
                            <span class="text-blue-400">${item.servicio}</span> 
                            <span class="text-slate-400 text-[9px] font-normal">(${item.perfil})</span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <span class="text-green-400">$${item.precio.toFixed(2)}</span>
                            <button type="button" onclick="quitarDelCarrito(${index})" class="text-red-400 hover:text-red-600 px-1">✖</button>
                        </div>
                    </div>
                `;
            });
            contenedor.innerHTML = html;
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vDia = 0, cDia = 0, uMes = 0, uAnio = 0;

            let filtrados = clientesGlobal.filter(c => 
                c[1].toString().toLowerCase().includes(busqueda) || 
                c[3].toString().toLowerCase().includes(busqueda)
            );

            let html = "";
            filtrados.forEach(c => {
                const fechaV = procesarFecha(c[10]);
                const diff = fechaV.getTime() - hoy.getTime();
                const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
                const fReg = new Date(parseInt(c[0]));
                const costoItem = parseFloat(c[4]) || 0;
                const ventaItem = parseFloat(c[5]) || 0;
                const gan = ventaItem - costoItem;

                if(!isNaN(fReg.getTime())) {
                    if(fReg.toDateString() === hoy.toDateString()) { vDia += ventaItem; cDia += costoItem; }
                    if(fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026) uMes += gan;
                    if(fReg.getFullYear() === 2026) uAnio += gan;
                }

                let clse = dias <= 0 ? "status-red" : (dias <= 3 ? "status-yellow" : "status-green");
                let fechaTxt = isNaN(fechaV.getTime()) ? "ERROR" : fechaV.toISOString().split('T')[0];

                // Adaptar dinámicamente el botón de cobro si ya está vencido
                let botonCobro = "";
                if (dias <= 0) {
                    botonCobro = `<button onclick="wsNotificarVencido('${c[0]}')" class="bg-red-600 hover:bg-red-500 px-3 py-1.5 rounded font-black uppercase shadow-md transition-colors">⚠️ Corte</button>`;
                } else {
                    botonCobro = `<button onclick="wsCobroAviso('${c[0]}')" class="bg-green-600 hover:bg-green-500 px-3 py-1.5 rounded font-black uppercase shadow-md transition-colors">Cobro</button>`;
                }

                html += `
                    <tr class="hover:bg-slate-800/40 border-b border-slate-800/50 transition-colors">
                        <td class="p-4 text-blue-400 font-bold uppercase">${c[1]}<br><span class="text-slate-500 font-black text-[10px]">${c[3]}</span></td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded-full border font-black ${clse}">
                                ${dias <= 0 ? 'VENCIDO' : dias + ' DIAS'}
                            </span>
                        </td>
                        <td class="p-4 text-center text-slate-500 font-mono">${fechaTxt}</td>
                        <td class="p-4 text-center space-x-1">
                            <button onclick="wsAcceso('${c[0]}')" class="bg-blue-600 px-3 py-1.5 rounded font-black uppercase shadow-md">Entrega</button>
                            <button onclick="renovar('${c[0]}')" class="bg-indigo-600 px-3 py-1.5 rounded font-black uppercase shadow-md">Renovar</button>
                            ${botonCobro}
                        </td>
                        <td class="p-4 text-center"><button onclick="eliminar('${c[0]}')" class="text-slate-700 hover:text-red-500 font-bold text-lg">✖</button></td>
                    </tr>`;
            });

            tabla.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center">Sin resultados</td></tr>';
            
            document.getElementById('gananciaDia').innerText = `$${vDia.toFixed(2)}`;
            document.getElementById('costoDia').innerText = `$${cDia.toFixed(2)}`;
            document.getElementById('netoDia').innerText = `$${(vDia - cDia).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uAnio.toFixed(2)}`;
        }

        async function guardarEnGoogle() {
            const nombre = document.getElementById('nombre').value.toUpperCase().trim();
            const telefono = document.getElementById('telefono').value.trim();
            const vencimiento = document.getElementById('vencimiento').value;
            const btn = document.getElementById('btnGuardar');

            if (!nombre || !telefono || !vencimiento) {
                alert("Por favor rellena Nombre, WhatsApp y Fecha de Vencimiento.");
                return;
            }

            if (carritoServicios.length === 0) {
                alert("Debes añadir al menos 1 servicio al carrito antes de guardar.");
                return;
            }

            let listaNombresApps = [];
            let totalCosto = 0;
            let totalPrecio = 0;
            let listaCorreos = [];
            let listaClaves = [];
            let listaPerfiles = [];
            let listaPins = [];

            carritoServicios.forEach(item => {
                listaNombresApps.push(item.servicio);
                totalCosto += item.costo;
                totalPrecio += item.precio;
                listaCorreos.push(item.correo);
                listaClaves.push(item.clave);
                listaPerfiles.push(item.perfil);
                listaPins.push(item.pin);
            });

            const data = {
                id: Date.now(),
                nombre: nombre,
                telefono: telefono,
                servicio: listaNombresApps.join(" + "), 
                costo: totalCosto,
                precio: totalPrecio,
                correo: listaCorreos.join(" | "), 
                clave: listaClaves.join(" | "),
                perfil: listaPerfiles.join(" | "),
                pin: listaPins.join(" | "),
                vencimiento: vencimiento
            };

            btn.innerText = "ESPERE...";
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function renovar(id) {
            if(!confirm("¿Renovar?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'RENEW', id: id }) });
            location.reload();
        }

        async function eliminar(id) {
            if(!confirm("¿Eliminar?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
            location.reload();
        }

        function wsAcceso(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const fechaV = procesarFecha(c[10]).toISOString().split('T')[0];
            
            const apps = c[3].toString().split(" + ");
            const correos = c[6].toString().split(" | ");
            const claves = c[7].toString().split(" | ");
            const perfiles = c[8].toString().split(" | ");
            const pins = c[9].toString().split(" | ");

            let msj = `🚀 *SERVICIOS ACTIVOS - ${c[1]}* ⭐\n`;
            msj += `Gracias por tu compra en Streaming Planet\n\n`;
            
            const sep = "------------------------------";

            apps.forEach((app, index) => {
                msj += `${sep}\n`;
                msj += `📺 *SERVICIO:* ${app}\n`;
                msj += `✉️ *Usuario:* ${correos[index] || correos[0]}\n`;
                msj += `🔑 *Clave:* ${claves[index] || claves[0]}\n`;
                msj += `👤 *Perfil:* ${perfiles[index] || 'N/A'}\n`;
                msj += `🔐 *PIN:* ${pins[index] || 'N/A'}\n`;
            });

            msj += `${sep}\n\n🗓️ *Vence:* ${fechaV}\n\n`;
            msj += `🚨 *REGLAS IMPORTANTES*:\n`;
            msj += `* No cambiar datos de la cuenta.\n`;
            msj += `* Usar solo el perfil asignado.\n`;
            msj += `* Disfruta tu programación 🍿`;
            
            abrirWS(c[2], msj);
        }

        // PULIDO: Mensaje de Cobro / Recordatorio (3 días o menos por vencer)
        function wsCobroAviso(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const fechaV = procesarFecha(c[10]).toISOString().split('T')[0];
            
            const apps = c[3].toString().split(" + ");
            const correos = c[6].toString().split(" | ");

            let msj = `⏰ *RECORDATORIO DE PAGO - ${c[1]}* 🗓️\n`;
            msj += `Hola, te saludamos de *Streaming Planet*. Esperamos que estés disfrutando tu programación. ✨\n\n`;
            msj += `Te notificamos que el siguiente servicio está próximo a vencer:\n`;
            
            const sep = "------------------------------";
            msj += `${sep}\n`;

            // Listar cada app con su respectivo correo para orientar al vendedor/cliente
            apps.forEach((app, index) => {
                const correoActual = correos[index] || correos[0];
                msj += `📺 *Plataforma:* ${app}\n`;
                msj += `✉️ *Cuenta:* ${correoActual}\n\n`;
            });

            msj += `${sep}\n`;
            msj += `📅 *Fecha de vencimiento:* ${fechaV}\n\n`;
            msj += `💬 ¿Deseas renovar tu pantalla para mantener activo tu perfil sin interrupciones? Quedamos atentos a tu respuesta. ⚡`;
            
            abrirWS(c[2], msj);
        }

        // PULIDO: Mensaje Especial cuando ya está VENCIDO
        function wsNotificarVencido(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const fechaV = procesarFecha(c[10]).toISOString().split('T')[0];
            
            const apps = c[3].toString().split(" + ");
            const correos = c[6].toString().split(" | ");

            let msj = `⚠️ *AVISO DE VENCIMIENTO - ${c[1]}* 🚫\n`;
            msj += `Hola, te saludamos de *Streaming Planet*. Nos comunicamos contigo para informarte que tu suscripción ha caducado.\n\n`;
            msj += `Detalle del servicio vencido:\n`;
            
            const sep = "------------------------------";
            msj += `${sep}\n`;

            apps.forEach((app, index) => {
                const correoActual = correos[index] || correos[0];
                msj += `❌ *Plataforma:* ${app}\n`;
                msj += `✉️ *Cuenta:* ${correoActual}\n\n`;
            });

            msj += `${sep}\n`;
            msj += `📅 *Venció el día:* ${fechaV}\n\n`;
            msj += `📢 *Nota:* El acceso a la cuenta ha sido suspendido temporalmente. Si deseas reactivar el servicio y conservar tu mismo perfil de reproducción, avísanos para procesar tu renovación de inmediato. 🚀`;
            
            abrirWS(c[2], msj);
        }

        function abrirWS(tel, msj) {
            const fTel = tel.toString().replace(/\D/g, '');
            const msjFinal = encodeURIComponent(msj);
