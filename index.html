<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet - Panel Pro 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .status-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-yellow { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.4); }
        .status-green { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.4); }
        .btn-ws { transition: transform 0.1s active; }
        .btn-ws:active { transform: scale(0.95); }
        .tabla-contenedor { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { min-width: 850px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 p-4 font-sans text-xs">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6 font-black">
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-center shadow-lg">
                <p class="text-[9px] text-blue-400 uppercase mb-1">Ventas Hoy</p>
                <p id="gananciaDia" class="text-xl">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-red-900/30 text-center shadow-lg">
                <p class="text-[9px] text-red-400 uppercase mb-1">Inversión Hoy</p>
                <p id="costoDia" class="text-xl text-red-400 font-bold">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-emerald-500/40 text-center shadow-lg bg-emerald-500/5">
                <p class="text-[9px] text-emerald-400 uppercase mb-1 italic text-shadow">Caja Neta Hoy</p>
                <p id="netoDia" class="text-xl text-emerald-400 font-black">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-center shadow-lg">
                <p class="text-[9px] text-purple-400 uppercase mb-1 italic">Utilidad Mes</p>
                <p id="gananciaMes" class="text-xl">$0.00</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-2xl border border-yellow-500/20 text-center shadow-lg">
                <p class="text-[9px] text-yellow-500 uppercase mb-1 italic">Balance 2026</p>
                <p id="gananciaAnio" class="text-xl font-bold">$0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-slate-900 p-5 rounded-2xl border border-slate-800 h-fit shadow-2xl">
                <h2 class="text-blue-400 font-bold mb-4 uppercase tracking-widest flex justify-between">
                    <span>Nuevo Registro</span>
                    <label class="text-[9px] text-slate-500 flex items-center gap-1 cursor-pointer">
                        <input type="checkbox" id="mantenerDatos"> COMBO
                    </label>
                </h2>
                <div class="space-y-3">
                    <input id="nombre" type="text" placeholder="NOMBRE CLIENTE" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold uppercase outline-none focus:border-blue-500">
                    <input id="telefono" type="text" placeholder="WHATSAPP (58412...)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-blue-500">
                    <select id="servicio" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold outline-none">
                        <option>NETFLIX</option><option>DISNEY+</option><option>MAX</option>
                        <option>PRIME VIDEO</option><option>PARAMOUNT+</option><option>IPTV</option>
                        <option>MAGIS TV</option><option>YOUTUBE</option><option>SPOTIFY</option><option>CANVA PRO</option>
                    </select>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="costo" type="number" step="0.01" placeholder="Costo $" class="bg-slate-800 border border-slate-700 rounded-lg p-2.5 outline-none focus:border-red-500">
                        <input id="precio" type="number" step="0.01" placeholder="Venta $" class="bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold text-green-400 outline-none focus:border-green-500 text-lg">
                    </div>
                    <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 space-y-2">
                        <input id="correo" type="text" placeholder="Correo / Usuario" class="w-full bg-transparent border-b border-slate-800 p-1 outline-none">
                        <input id="clave" type="text" placeholder="Contraseña" class="w-full bg-transparent border-b border-slate-800 p-1 outline-none">
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input id="perfil" type="text" placeholder="Perfil" class="bg-slate-800 p-1 rounded text-[9px]">
                            <input id="pin" type="text" placeholder="PIN" class="bg-slate-800 p-1 rounded text-[9px]">
                        </div>
                    </div>
                    <input id="vencimiento" type="date" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 font-bold text-white outline-none">
                    <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-3 rounded-xl shadow-lg uppercase transition-all italic tracking-tighter">Guardar Registro</button>
                </div>
            </div>

            <div class="lg:col-span-3 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
                <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/30">
                    <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar cliente o servicio..." class="w-full max-w-md bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 outline-none focus:border-blue-500">
                </div>
                <div class="tabla-contenedor max-h-[650px]">
                    <table class="w-full text-left">
                        <thead class="bg-slate-950 text-slate-500 uppercase text-[9px] tracking-widest sticky top-0 z-10">
                            <tr>
                                <th class="p-4">Cliente / Servicio</th>
                                <th class="p-4 text-center">Estado</th>
                                <th class="p-4">Vence</th>
                                <th class="p-4 text-center">Acciones</th>
                                <th class="p-4"></th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="divide-y divide-slate-800">
                            <tr><td colspan="5" class="p-20 text-center loading text-slate-600 font-bold italic text-xs uppercase">Conectando con la base de datos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                clientesGlobal = await res.json();
                renderizarTabla();
            } catch(e) { console.error("Error cargando datos:", e); }
        }

        function procesarFecha(valor) {
            if (!valor) return new Date(0);
            if (!isNaN(valor) && typeof valor !== 'string') return new Date((valor - 25569) * 86400 * 1000);
            if (valor.toString().includes('T')) return new Date(valor);
            let partes = valor.toString().split(/[-/]/);
            if (partes.length === 3) {
                if (partes[0].length === 4) return new Date(partes[0], partes[1] - 1, partes[2]);
                return new Date(partes[2], partes[1] - 1, partes[0]);
            }
            return new Date(valor);
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            let vDia = 0, cDia = 0, uMes = 0, uAnio = 0;

            let filtrados = clientesGlobal.filter(c => 
                c[1].toString().toLowerCase().includes(busqueda) || 
                c[3].toString().toLowerCase().includes(busqueda)
            );

            let html = "";
            filtrados.forEach(c => {
                const fReg = new Date(parseInt(c[0]));
                const costoItem = parseFloat(c[4]) || 0;
                const ventaItem = parseFloat(c[5]) || 0;
                const gan = ventaItem - costoItem;

                // Cálculos de Dashboard
                if(!isNaN(fReg.getTime())) {
                    if(fReg.toDateString() === hoy.toDateString()) {
                        vDia += ventaItem;
                        cDia += costoItem;
                    }
                    if(fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026) uMes += gan;
                    if(fReg.getFullYear() === 2026) uAnio += gan;
                }

                // Lógica de Vencimiento
                const fechaV = procesarFecha(c[10]);
                const diff = fechaV.getTime() - hoy.getTime();
                const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
                let clse = dias <= 0 ? "status-red font-black" : (dias <= 3 ? "status-yellow font-bold" : "status-green font-bold");
                let fechaTxt = isNaN(fechaV.getTime()) ? "FECHA ERRÓNEA" : fechaV.toISOString().split('T')[0];

                html += `
                    <tr class="hover:bg-slate-800/40 transition-colors border-b border-slate-800/50">
                        <td class="p-4 font-bold uppercase text-blue-400">
                            ${c[1]}<br><span class="text-slate-500 text-[9px] font-black italic tracking-wider">${c[3]}</span>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded-full border text-[9px] uppercase ${clse}">
                                ${dias <= 0 ? 'VENCIDO' : dias + ' DÍAS'}
                            </span>
                        </td>
                        <td class="p-4 text-slate-500 font-mono font-bold">${fechaTxt}</td>
                        <td class="p-4 text-center space-x-1">
                            <button onclick="wsAcceso('${c[0]}')" class="bg-blue-600 px-2 py-1.5 rounded text-[9px] font-black uppercase btn-ws shadow-md hover:bg-blue-500 transition-all">Entrega</button>
                            <button onclick="renovar('${c[0]}')" class="bg-indigo-600 px-2 py-1.5 rounded text-[9px] font-black uppercase btn-ws shadow-md hover:bg-indigo-500 transition-all">Renovar</button>
                            <button onclick="wsCobro('${c[0]}')" class="bg-green-600 px-2 py-1.5 rounded text-[9px] font-black uppercase btn-ws shadow-md hover:bg-green-500 transition-all">Cobro</button>
                        </td>
                        <td class="p-4"><button onclick="eliminar('${c[0]}')" class="text-slate-800 hover:text-red-500 transition-colors">🗑️</button></td>
                    </tr>`;
            });

            tabla.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center italic text-slate-500">No se encontraron clientes con ese nombre...</td></tr>';
            
            // Actualizar Dashboards
            document.getElementById('gananciaDia').innerText = `$${vDia.toFixed(2)}`;
            document.getElementById('costoDia').innerText = `$${cDia.toFixed(2)}`;
            document.getElementById('netoDia').innerText = `$${(vDia - cDia).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uAnio.toFixed(2)}`;
        }

        async function guardarEnGoogle() {
            const btn = document.getElementById('btnGuardar');
            const data = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                telefono: document.getElementById('telefono').value.trim(),
                servicio: document.getElementById('servicio').value,
                costo: document.getElementById('costo').value || 0,
                precio: document.getElementById('precio').value || 0,
                correo: document.getElementById('correo').value.trim(),
                clave: document.getElementById('clave').value.trim(),
                perfil: document.getElementById('perfil').value.trim(),
                pin: document.getElementById('pin').value.trim(),
                vencimiento: document.getElementById('vencimiento').value
            };
            if(!data.nombre || !data.vencimiento) return alert("⚠️ Debes ingresar al menos el Nombre y la Fecha.");
            btn.disabled = true; btn.innerText = "REGISTRANDO...";
            
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            if(document.getElementById('mantenerDatos').checked) {
                document.getElementById('costo').value = ""; document.getElementById('precio').value = "";
                btn.disabled = false; btn.innerText = "REGISTRAR SIGUIENTE"; cargarDatos();
            } else { location.reload(); }
        }

        async function renovar(id) {
            if(!confirm("¿Deseas renovar este servicio por 30 días adicionales?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'RENEW', id: id }) });
            location.reload();
        }

        async function eliminar(id) {
            if(!confirm("¿Estás seguro de eliminar este registro permanentemente?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
            location.reload();
        }

        function wsAcceso(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const fechaV = procesarFecha(c[10]).toISOString().split('T')[0];
            const msj = `⭐ SERVICIOS ACTIVOS - ${c[1]} ⭐%0AGracias por tu compra en Streaming planet steaming%0A%0A------------------------------%0A📺 SERVICIO: ${c[3]}%0A👤 Usuario: ${c[6]}%0A🔑 Clave: ${c[7]}%0A👤 Perfil: ${c[8]}%0A📌 PIN: ${c[9]}%0A🗓️ Vence: ${fechaV}%0A------------------------------%0A%0A⚠️ REGLAS IMPORTANTES:%0A- No cambiar datos de la cuenta.%0A- Usar solo el perfil asignado.%0A- Disfruta tu programación 🍿`;
            abrirWS(c[2], msj);
        }

        function wsCobro(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const fechaV = procesarFecha(c[10]).toISOString().split('T')[0];
            const msj = `Hola *${c[1]}*, te saludamos de *Streaming Planet*. Tu servicio de *${c[3]}* vence pronto (${fechaV}). ¿Deseas renovar para no perder tu perfil? 🚀`;
            abrirWS(c[2], msj);
        }

        function abrirWS(tel, msj) {
            const fTel = tel.replace('+', '').replace(/\s/g, '');
            const urlApp = `whatsapp://send?phone=${fTel}&text=${msj}`;
            const urlWeb = `https://wa.me/${fTel}?text=${msj}`;
            window.location.href = urlApp;
            setTimeout(() => { if (!document.hidden) window.open(urlWeb, '_blank'); }, 700);
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
