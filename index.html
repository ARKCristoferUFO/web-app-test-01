<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming - Panel 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .status-green { color: #10b981; border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .status-yellow { color: #fbbf24; border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .status-red { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .btn-plataforma.active { background: #2563eb !important; color: white !important; border-color: #60a5fa; box-shadow: 0 0 10px rgba(37,99,235,0.3); }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body class="pb-10">

    <div class="sticky top-0 z-50 p-4 glass mb-6">
        <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-5 gap-4 text-center">
            <div><p class="text-[9px] uppercase text-slate-500 font-bold">Ventas Hoy</p><h2 id="gananciaDia" class="text-lg font-black">$0.00</h2></div>
            <div><p class="text-[9px] uppercase text-slate-500 font-bold">Costo Hoy</p><h2 id="costoDia" class="text-lg font-black text-red-500">$0.00</h2></div>
            <div class="border-x border-slate-800 px-2"><p class="text-[9px] uppercase text-blue-400 font-bold">Utilidad Hoy</p><h2 id="netoDia" class="text-lg font-black text-blue-400">$0.00</h2></div>
            <div><p class="text-[9px] uppercase text-slate-500 font-bold">Utilidad Mes</p><h2 id="gananciaMes" class="text-lg font-black text-emerald-500">$0.00</h2></div>
            <div><p class="text-[9px] uppercase text-slate-500 font-bold">Utilidad Año</p><h2 id="gananciaAnio" class="text-lg font-black text-slate-300">$0.00</h2></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <h3 class="text-blue-500 font-black text-xs uppercase mb-6 tracking-widest">Registrar Venta</h3>
                <div class="space-y-4">
                    <input type="text" id="nombre" placeholder="NOMBRE DEL CLIENTE" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 outline-none text-white text-xs font-bold uppercase focus:border-blue-500">
                    <input type="number" id="telefono" placeholder="TELÉFONO (58...)" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 outline-none text-white text-xs">
                    
                    <p class="text-[9px] text-slate-500 font-bold uppercase">Selecciona Plataformas:</p>
                    <div id="gridPlataformas" class="grid grid-cols-3 gap-2 max-h-44 overflow-y-auto pr-1"></div>

                    <div id="contenedorDatosDinamicos" class="space-y-3 mt-4"></div>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="costo" placeholder="COSTO" step="0.01" class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center text-white text-sm font-bold">
                        <input type="number" id="precio" placeholder="PRECIO" step="0.01" class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-center text-blue-400 text-sm font-bold">
                    </div>

                    <input type="date" id="vencimiento" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 text-white text-xs font-bold">
                    
                    <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest transition-all">Guardar Registro</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-slate-900/50 rounded-3xl border border-slate-800 shadow-2xl overflow-hidden">
                <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                    <input type="text" id="buscador" oninput="renderizarTabla()" placeholder="Buscar..." class="bg-slate-950 p-2 rounded-xl border border-slate-800 text-xs text-white outline-none w-64">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-950/50 text-slate-500 uppercase text-[9px] font-black">
                            <tr>
                                <th class="p-4">Cliente / Servicio</th>
                                <th class="p-4 text-center">Estado</th>
                                <th class="p-4 text-center">Vence</th>
                                <th class="p-4 text-center">Acciones</th>
                                <th class="p-4"></th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="divide-y divide-slate-800/30"></tbody>
                    </table>
                </div>
                <div id="loader" class="p-10 text-center text-slate-600 text-[10px] uppercase font-black">Sincronizando...</div>
            </div>
        </div>
    </div>

    <script>
        // ¡IMPORTANTE! Reemplaza con tu URL después de publicar
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        
        let clientesGlobal = [];
        let datosTemporales = {}; 
        const listaPlat = ["NETFLIX PERFIL", "NETFLIX PERSONAL", "DISNEY+", "MAX", "PRIME VIDEO", "PARAMOUNT+", "IPTV", "FLUJO TV", "TELELATINO", "VIX", "YOUTUBE", "SPOTIFY", "CRUNCHYROLL", "VIKI RAKUTEN", "OLEADA TV", "CANVA PRO"];

        function initGrid() {
            const grid = document.getElementById('gridPlataformas');
            grid.innerHTML = '';
            listaPlat.forEach(p => {
                const btn = document.createElement('button');
                btn.innerText = p;
                btn.className = "btn-plataforma p-2 rounded-lg text-[8px] font-bold bg-slate-800 text-slate-400 border border-slate-700 hover:border-slate-500 transition-all";
                btn.onclick = () => togglePlataforma(btn, p);
                grid.appendChild(btn);
            });
        }

        function togglePlataforma(btn, nombre) {
            // Guardar datos actuales de los inputs antes de redibujar
            const blocks = document.querySelectorAll('.data-block');
            blocks.forEach(b => {
                const id = b.dataset.plataforma;
                datosTemporales[id] = {
                    correo: b.querySelector('.val-correo').value,
                    clave: b.querySelector('.val-clave').value,
                    perfil: b.querySelector('.val-perfil').value,
                    pin: b.querySelector('.val-pin').value
                };
            });
            btn.classList.toggle('active');
            renderizarFormularios();
        }

        function renderizarFormularios() {
            const contenedor = document.getElementById('contenedorDatosDinamicos');
            const activos = Array.from(document.querySelectorAll('.btn-plataforma.active')).map(b => b.innerText);
            contenedor.innerHTML = '';
            
            activos.forEach(n => {
                const d = datosTemporales[n] || { correo: '', clave: '', perfil: '', pin: '' };
                const div = document.createElement('div');
                div.className = "bg-slate-950 p-4 rounded-2xl border border-blue-600/20 space-y-2 data-block";
                div.dataset.plataforma = n;
                div.innerHTML = `<p class="text-blue-500 font-black text-[9px] uppercase tracking-widest">${n}</p>
                    <input type="text" placeholder="Correo" class="val-correo w-full bg-transparent border-b border-slate-800 p-1 outline-none text-white text-[11px]" value="${d.correo}">
                    <input type="text" placeholder="Clave" class="val-clave w-full bg-transparent border-b border-slate-800 p-1 outline-none text-white text-[11px]" value="${d.clave}">
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <input type="text" placeholder="Perfil" class="val-perfil bg-slate-900 p-2 rounded-lg text-[10px] text-white border border-slate-800" value="${d.perfil}">
                        <input type="text" placeholder="PIN" class="val-pin bg-slate-900 p-2 rounded-lg text-[10px] text-white border border-slate-800" value="${d.pin}">
                    </div>`;
                contenedor.appendChild(div);
            });
        }

        async function guardarEnGoogle() {
            const btn = document.getElementById('btnGuardar');
            const nom = document.getElementById('nombre').value.toUpperCase().trim();
            const blocks = document.querySelectorAll('.data-block');
            if (!nom || blocks.length === 0) return alert("Faltan datos");
            btn.innerText = "GUARDANDO..."; btn.disabled = true;
            
            let c=[], k=[], p=[], n=[], s=[];
            blocks.forEach(b => {
                s.push(b.dataset.plataforma);
                c.push(b.querySelector('.val-correo').value.trim() || '---');
                k.push(b.querySelector('.val-clave').value.trim() || '---');
                p.push(b.querySelector('.val-perfil').value.trim() || '---');
                n.push(b.querySelector('.val-pin').value.trim() || '---');
            });

            const payload = {
                id: Date.now().toString(),
                nombre: nom, 
                telefono: document.getElementById('telefono').value.trim(),
                servicio: s.join(" + "), 
                costo: Number(document.getElementById('costo').value) || 0,
                precio: Number(document.getElementById('precio').value) || 0, 
                correo: c.join(" , "),
                clave: k.join(" , "), 
                perfil: p.join(" , "), 
                pin: n.join(" , "),
                vencimiento: document.getElementById('vencimiento').value
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(() => location.reload(), 1000);
            } catch (e) { btn.innerText = "ERROR"; btn.disabled = false; }
        }

        async function cargarDatos() {
            try {
                google.script.run.withSuccessHandler(data => {
                    clientesGlobal = data.slice(1); // Ignorar cabecera
                    document.getElementById('loader').style.display = 'none';
                    renderizarTabla();
                }).getData();
            } catch (e) { console.error(e); }
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const buscar = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vD=0, cD=0, uM=0, uA=0;
            
            let fil = clientesGlobal.filter(c => c[1].toString().toLowerCase().includes(buscar) || c[3].toString().toLowerCase().includes(buscar));
            let html = "";

            fil.forEach(c => {
                const fV = procesarFecha(c[10]);
                const dias = Math.ceil((fV.getTime() - hoy.getTime()) / (1000*60*60*24));
                const fR = new Date(parseInt(c[0]));
                const util = (Number(c[5]) || 0) - (Number(c[4]) || 0);

                if (!isNaN(fR.getTime())) {
                    if (fR.toDateString() === hoy.toDateString()) { vD += Number(c[5]); cD += Number(c[4]); }
                    if (fR.getMonth() === hoy.getMonth() && fR.getFullYear() === 2026) uM += util;
                    uA += util;
                }

                let color = dias <= 0 ? "status-red" : (dias <= 3 ? "status-yellow" : "status-green");
                
                html += `<tr class="hover:bg-slate-800/20 border-b border-slate-800/30 text-[10px]">
                    <td class="p-4"><div class="font-black text-blue-400 uppercase text-[11px]">${c[1]}</div><div class="text-[9px] text-slate-500 font-bold">${c[3]}</div></td>
                    <td class="p-4 text-center"><span class="px-2.5 py-1 rounded-full border font-black ${color}">${dias <= 0 ? 'VENCIDO' : dias + ' DÍAS'}</span></td>
                    <td class="p-4 text-center text-slate-500 font-mono">${isNaN(fV.getTime()) ? '---' : fV.toISOString().split('T')[0]}</td>
                    <td class="p-4"><div class="flex flex-wrap gap-1 justify-center">
                        <button onclick="entregar('${c[0]}', 'datos')" class="bg-blue-600 px-3 py-1.5 rounded font-black text-[9px] uppercase">Entregar</button>
                        <button onclick="renovar('${c[0]}')" class="bg-emerald-600 px-2 py-1.5 rounded font-black text-[9px] uppercase">Renovar</button>
                    </div></td>
                    <td class="p-4 text-right"><button onclick="eliminar('${c[0]}')" class="text-slate-800 hover:text-red-500 transition-colors">✖</button></td>
                </tr>`;
            });

            tabla.innerHTML = html;
            document.getElementById('gananciaDia').innerText = `$${vD.toFixed(2)}`;
            document.getElementById('costoDia').innerText = `$${cD.toFixed(2)}`;
            document.getElementById('netoDia').innerText = `$${(vD-cD).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uM.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uA.toFixed(2)}`;
        }

        function entregar(idOriginal, tipo) {
            const cliente = clientesGlobal.find(x => x[0].toString() === idOriginal.toString());
            if (!cliente) return;
            let num = cliente[2].toString().replace(/\D/g, '');
            if (num.length <= 10) num = '58' + num;

            let msj = "";
            if (tipo === 'datos') {
                const s = (cliente[3] || "").split("+").map(x => x.trim());
                const co = (cliente[6] || "").split(",").map(x => x.trim());
                const cl = (cliente[7] || "").split(",").map(x => x.trim());
                const pe = (cliente[8] || "").split(",").map(x => x.trim());
                const pi = (cliente[9] || "").split(",").map(x => x.trim());
                const fv = (cliente[10] || "---").toString().split('T')[0];
                let b = "";
                s.forEach((srv, i) => {
                    b += `📺 *SERVICIO:* ${srv}\n✉️ *User:* ${co[i] || co[0]}\n🔑 *Pass:* ${cl[i] || cl[0]}\n👤 *Perfil:* ${pe[i] || pe[0]}\n🔐 *PIN:* ${pi[i] || pi[0]}\n--------------------\n`;
                });
                msj = `🚀 *ENTREGA DE CUENTA - ${cliente[1]}* ⭐\n\n${b}🗓 *Vence:* ${fv}\n\n*Streaming Planet*`;
            }
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msj)}`, '_blank');
        }

        async function renovar(id) {
            if (confirm("¿Renovar 30 días?")) {
                const c = clientesGlobal.find(x => x[0].toString() === id.toString());
                let fv = procesarFecha(c[10]); fv.setDate(fv.getDate() + 30);
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'UPDATE', id: id, vencimiento: fv.toISOString().split('T')[0] }) });
                setTimeout(() => location.reload(), 1000);
            }
        }

        async function eliminar(id) {
            if (confirm("¿Borrar?")) {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
                setTimeout(() => location.reload(), 500);
            }
        }

        function procesarFecha(v) {
            if (!v) return new Date(0);
            if (!isNaN(v) && typeof v !== 'string') return new Date((v - 25569) * 86400 * 1000);
            let p = v.toString().split(/[-/T]/);
            return p.length >= 3 ? (p[0].length === 4 ? new Date(p[0], p[1]-1, p[2]) : new Date(p[2], p[1]-1, p[0])) : new Date(v);
        }

        window.onload = () => { 
            initGrid(); 
            cargarDatos(); 
            document.getElementById('vencimiento').value = new Date(Date.now() + 2592000000).toISOString().split('T')[0]; 
        };
    </script>
</body>
</html>
