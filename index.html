<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-green { color: #10b981; border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .status-yellow { color: #fbbf24; border-color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .status-red { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .btn-plataforma.active { background: #2563eb !important; color: white !important; border-color: #60a5fa; box-shadow: 0 0 10px rgba(37, 99, 235, 0.5); }
        body { background-color: #020617; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-300 font-sans pb-10">

    <!-- DASHBOARD -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 p-4 sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md">
        <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800 text-center">
            <p class="text-[9px] uppercase text-slate-500 font-bold">Ventas Hoy</p>
            <h2 id="gananciaDia" class="text-lg font-black text-white">$0.00</h2>
        </div>
        <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800 text-center">
            <p class="text-[9px] uppercase text-slate-500 font-bold">Costo Hoy</p>
            <h2 id="costoDia" class="text-lg font-black text-red-500">$0.00</h2>
        </div>
        <div class="bg-slate-900 p-3 rounded-2xl border border-blue-900/30 text-center">
            <p class="text-[9px] uppercase text-blue-400 font-bold">Neto Hoy</p>
            <h2 id="netoDia" class="text-lg font-black text-blue-400">$0.00</h2>
        </div>
        <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800 text-center">
            <p class="text-[9px] uppercase text-slate-500 font-bold">Mes (Utilidad)</p>
            <h2 id="gananciaMes" class="text-lg font-black text-emerald-500">$0.00</h2>
        </div>
        <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800 text-center">
            <p class="text-[9px] uppercase text-slate-500 font-bold">Año (Utilidad)</p>
            <h2 id="gananciaAnio" class="text-lg font-black text-white">$0.00</h2>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- COLUMNA IZQUIERDA: FORMULARIO -->
        <div class="lg:col-span-1 space-y-4">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl">
                <h3 class="text-blue-500 font-black text-xs uppercase mb-4 italic">Nuevo Registro</h3>
                <div class="space-y-3">
                    <input type="text" id="nombre" placeholder="NOMBRE CLIENTE" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 outline-none focus:border-blue-500 uppercase font-bold text-white text-xs">
                    <input type="number" id="telefono" placeholder="WHATSAPP (Ej: 58412...)" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 outline-none text-white text-xs">
                    
                    <p class="text-[9px] font-bold text-slate-600 uppercase pt-2">Servicios:</p>
                    <div id="gridPlataformas" class="grid grid-cols-3 gap-1.5 max-h-40 overflow-y-auto p-1"></div>

                    <div id="contenedorDatosDinamicos" class="space-y-2 mt-4"></div>

                    <div class="grid grid-cols-2 gap-3 pt-4">
                        <div class="bg-slate-950 p-2 rounded-xl border border-slate-800">
                            <p class="text-[8px] text-slate-500 uppercase font-bold">Inversión $</p>
                            <input type="number" id="costo" step="0.01" class="bg-transparent w-full outline-none text-white font-bold text-sm" value="0.00">
                        </div>
                        <div class="bg-slate-950 p-2 rounded-xl border border-slate-800">
                            <p class="text-[8px] text-blue-500 uppercase font-bold">Venta $</p>
                            <input type="number" id="precio" step="0.01" class="bg-transparent w-full outline-none text-blue-400 font-bold text-sm" value="0.00">
                        </div>
                    </div>

                    <input type="date" id="vencimiento" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 text-white text-xs font-bold mt-2">
                    
                    <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all uppercase text-xs tracking-widest mt-4">Registrar Venta</button>
                </div>
            </div>
        </div>

        <!-- COLUMNA DERECHA: TABLA -->
        <div class="lg:col-span-2 bg-slate-900 rounded-3xl border border-slate-800 shadow-xl overflow-hidden">
            <div class="p-4 bg-slate-950/50">
                <input type="text" id="buscador" oninput="renderizarTabla()" placeholder="Buscar por nombre o plataforma..." class="w-full bg-slate-950 p-3 rounded-2xl border border-slate-800 outline-none text-xs text-white">
            </div>
            <div class="overflow-x-auto max-h-[700px]">
                <table class="w-full text-left text-[10px]">
                    <thead class="bg-slate-950 text-slate-500 uppercase text-[8px] sticky top-0 z-10">
                        <tr>
                            <th class="p-4">Cliente / Combo</th>
                            <th class="p-4 text-center">Estado</th>
                            <th class="p-4 text-center">Vence</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-slate-800/50">
                        <tr><td colspan="4" class="p-10 text-center text-slate-600 italic">Cargando base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];
        let datosTemporales = {}; 

        const listaPlat = ["NETFLIX PERFIL", "NETFLIX PERSONAL", "DISNEY+", "MAX", "PRIME VIDEO", "PARAMOUNT+", "IPTV", "FLUJO TV", "TELELATINO", "VIX", "YOUTUBE", "SPOTIFY", "CRUNCHYROLL", "VIKI RAKUTEN", "OLEADA TV", "CANVA PRO"];

        function initGrid() {
            const grid = document.getElementById('gridPlataformas');
            listaPlat.forEach(p => {
                const btn = document.createElement('button');
                btn.innerText = p;
                btn.className = "btn-plataforma p-1.5 rounded-lg text-[7px] font-bold bg-slate-800 text-slate-400 border border-slate-700 hover:border-blue-500";
                btn.onclick = () => togglePlataforma(btn, p);
                grid.appendChild(btn);
            });
        }

        function togglePlataforma(btn, nombre) {
            const blocks = document.querySelectorAll('.data-block');
            blocks.forEach(b => {
                const id = b.dataset.plataforma;
                datosTemporales[id] = {
                    correo: b.querySelector('.val-correo').value,
                    clave: b.querySelector('.val-clave').value,
                    perfil: b.querySelector('.val-perfil').value,
                    pin: b.querySelector('.val-pin').value
                };
            });
            btn.classList.toggle('active');
            renderizarFormularios();
        }

        function renderizarFormularios() {
            const contenedor = document.getElementById('contenedorDatosDinamicos');
            const activos = document.querySelectorAll('.btn-plataforma.active');
            contenedor.innerHTML = activos.length === 0 ? '<p class="text-slate-700 text-center py-4 text-[9px] uppercase">Sin servicios seleccionados</p>' : '';
            activos.forEach(btn => {
                const n = btn.innerText;
                const d = datosTemporales[n] || { correo: '', clave: '', perfil: '', pin: '' };
                const div = document.createElement('div');
                div.className = "bg-slate-950 p-3 rounded-xl border border-blue-900/40 data-block";
                div.dataset.plataforma = n;
                div.innerHTML = `
                    <p class="text-blue-400 font-bold text-[8px] mb-2 uppercase tracking-widest">${n}</p>
                    <input type="text" placeholder="Usuario / Correo" class="val-correo w-full bg-transparent border-b border-slate-800 p-1 outline-none text-white text-[10px] mb-1 focus:border-blue-500" value="${d.correo}">
                    <input type="text" placeholder="Contraseña" class="val-clave w-full bg-transparent border-b border-slate-800 p-1 outline-none text-white text-[10px] mb-2 focus:border-blue-500" value="${d.clave}">
                    <div class="flex gap-2">
                        <input type="text" placeholder="Perfil" class="val-perfil bg-slate-900 w-1/2 p-1.5 rounded text-[9px] text-white border border-slate-800 focus:border-blue-900" value="${d.perfil}">
                        <input type="text" placeholder="PIN" class="val-pin bg-slate-900 w-1/2 p-1.5 rounded text-[9px] text-white border border-slate-800 focus:border-blue-900" value="${d.pin}">
                    </div>`;
                contenedor.appendChild(div);
            });
        }

        async function cargarDatos() {
            try {
                const resp = await fetch(API_URL);
                clientesGlobal = await resp.json();
                renderizarTabla();
            } catch (err) {
                console.error("Error al cargar:", err);
                document.getElementById('cuerpoTabla').innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold">Error al conectar con la base de datos. Verifica la URL.</td></tr>';
            }
        }

        async function guardarEnGoogle() {
            const btn = document.getElementById('btnGuardar');
            const nom = document.getElementById('nombre').value.toUpperCase().trim();
            const blocks = document.querySelectorAll('.data-block');
            if (!nom || blocks.length === 0) return alert("Falta nombre o servicios");
            
            btn.innerText = "PROCESANDO..."; btn.disabled = true;
            
            let c=[], k=[], p=[], n=[], s=[];
            blocks.forEach(b => {
                s.push(b.dataset.plataforma);
                c.push(b.querySelector('.val-correo').value || '---');
                k.push(b.querySelector('.val-clave').value || '---');
                p.push(b.querySelector('.val-perfil').value || '---');
                n.push(b.querySelector('.val-pin').value || '---');
            });

            const pay = {
                id: Date.now(), nombre: nom, telefono: document.getElementById('telefono').value,
                servicio: s.join(" + "), costo: Number(document.getElementById('costo').value),
                precio: Number(document.getElementById('precio').value), correo: c.join(" , "),
                clave: k.join(" , "), perfil: p.join(" , "), pin: n.join(" , "),
                vencimiento: document.getElementById('vencimiento').value
            };

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(pay)
                });
                // Recarga forzada para ver cambios
                location.reload();
            } catch (e) {
                alert("Guardado enviado. Si no recarga solo, actualiza la página.");
                location.reload();
            }
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const buscar = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            
            let vD=0, cD=0, uM=0, uA=0;
            let fil = clientesGlobal.filter(c => c[1].toString().toLowerCase().includes(buscar) || c[3].toString().toLowerCase().includes(buscar));
            
            let html = "";
            fil.forEach(c => {
                const fV = procesarFecha(c[10]);
                const dias = Math.ceil((fV.getTime() - hoy.getTime()) / (1000*60*60*24));
                const fR = new Date(parseInt(c[0]));
                const util = (Number(c[5]) || 0) - (Number(c[4]) || 0);

                if(!isNaN(fR.getTime())) {
                    if(fR.toDateString() === hoy.toDateString()) { vD += Number(c[5]); cD += Number(c[4]); }
                    if(fR.getMonth() === hoy.getMonth() && fR.getFullYear() === 2026) uM += util;
                    uA += util;
                }

                let color = dias <= 0 ? "status-red" : (dias <= 3 ? "status-yellow" : "status-green");
                
                html += `<tr>
                    <td class="p-4"><span class="text-blue-400 font-bold uppercase text-[9px]">${c[1]}</span><br><span class="text-slate-500 italic text-[8px]">${c[3]}</span></td>
                    <td class="p-4 text-center"><span class="px-2 py-0.5 rounded-full border font-black ${color}">${dias <= 0 ? 'VENCIDO' : dias + ' DÍAS'}</span></td>
                    <td class="p-4 text-center text-slate-500 font-mono text-[9px]">${isNaN(fV.getTime()) ? '---' : fV.toISOString().split('T')[0]}</td>
                    <td class="p-4 flex gap-1 justify-center">
                        <button onclick="wsAcceso('${c[0]}')" class="bg-blue-600 px-2 py-1 rounded-md font-bold text-[8px] hover:bg-blue-500">ACCESO</button>
                        <button onclick="renovar('${c[0]}')" class="bg-emerald-600 px-2 py-1 rounded-md font-bold text-[8px] hover:bg-emerald-500">RENOVAR</button>
                        <button onclick="enviarMensaje('${c[0]}', 3)" class="bg-yellow-500 text-black px-2 py-1 rounded-md font-bold text-[8px] hover:bg-yellow-400">AVISO 3D</button>
                        <button onclick="enviarMensaje('${c[0]}', 0)" class="bg-red-600 px-2 py-1 rounded-md font-bold text-[8px] hover:bg-red-500">AVISO 0D</button>
                        <button onclick="eliminar('${c[0]}')" class="text-slate-700 ml-2 hover:text-red-500 transition-colors">✖</button>
                    </td>
                </tr>`;
            });
            tabla.innerHTML = html || '<tr><td colspan="4" class="p-10 text-center">No se encontraron registros</td></tr>';
            
            document.getElementById('gananciaDia').innerText = `$${vD.toFixed(2)}`;
            document.getElementById('costoDia').innerText = `$${cD.toFixed(2)}`;
            document.getElementById('netoDia').innerText = `$${(vD-cD).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uM.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uA.toFixed(2)}`;
        }

        function enviarMensaje(id, tipo) {
            const c = clientesGlobal.find(x => x[0] == id);
            let msj = tipo === 3 
                ? `Hola *${c[1]}* 👋\n\nTe recordamos de *Streaming Planet* 🚀 que tu servicio de *${c[3]}* vence en *3 días*. ¿Deseas renovar para no perder tu acceso? 🍿`
                : `¡Hola *${c[1]}*! 🚨\n\nTu servicio de *${c[3]}* **VENCE HOY**. Para evitar cortes en la pantalla, te recomendamos renovar antes de finalizar el día. ⭐\n\n¡Quedamos atentos!`;
            window.open(`https://api.whatsapp.com/send?phone=${c[2].toString().replace(/\D/g, '')}&text=${encodeURIComponent(msj)}`, "_blank");
        }

        function wsAcceso(id) {
            const c = clientesGlobal.find(x => x[0] == id);
            const servs = c[3].split(" + "), cors = c[6].split(" , "), keys = c[7].split(" , "), perfs = c[8].split(" , "), pins = c[9].split(" , ");
            let body = "";
            servs.forEach((s, i) => {
                body += `📺 SERVICIO: ${s.trim()}\n✉️ User: ${(cors[i]||cors[0]).trim()}\n🔑 Pass: ${(keys[i]||keys[0]).trim()}\n👤 Perfil: ${(perfs[i]||perfs[0]).trim()}\n🔐 PIN: ${(pins[i]||pins[0]).trim()}\n--------------------\n`;
            });
            const msj = `🚀 ACCESOS - ${c[1]} ⭐\n\n${body}🗓 Vence: ${procesarFecha(c[10]).toISOString().split('T')[0]}\n\n¡Gracias por preferir *Streaming Planet*!`;
            window.open(`https://api.whatsapp.com/send?phone=${c[2].toString().replace(/\D/g, '')}&text=${encodeURIComponent(msj)}`, "_blank");
        }

        function procesarFecha(v) {
            if (!v) return new Date(0);
            if (!isNaN(v) && typeof v !== 'string') return new Date((v - 25569) * 86400 * 1000);
            let p = v.toString().split(/[-/T]/);
            return p.length >= 3 ? (p[0].length === 4 ? new Date(p[0], p[1]-1, p[2]) : new Date(p[2], p[1]-1, p[0])) : new Date(v);
        }

        async function eliminar(id) { if(confirm("¿Eliminar registro permanentemente?")) { await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'DELETE', id: id }) }); location.reload(); } }
        async function renovar(id) { 
            const c = clientesGlobal.find(x => x[0] == id);
            if(confirm(`¿Renovar 30 días a ${c[1]}?`)) {
                let fv = procesarFecha(c[10]); fv.setDate(fv.getDate() + 30);
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'UPDATE', id: id, vencimiento: fv.toISOString().split('T')[0] }) });
                location.reload();
            }
        }

        window.onload = () => { 
            initGrid(); 
            cargarDatos(); 
            document.getElementById('vencimiento').value = new Date(Date.now() + 2592000000).toISOString().split('T')[0]; 
        };
    </script>
</body>
</html>
